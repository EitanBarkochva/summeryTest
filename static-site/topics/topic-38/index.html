וז."}, {"type": "paragraph", "text": "אינטרוספציה ״ לדעת מה מצבי הפנימי״ זה איברים ששולחים סימנים למוח. זה מאוד קשור לרגש. יש נוירונים בערך בגודל של מוח של חתוך במערכת העיכול ולכן לפעמים שאומרים יש לי תחושת בטן לא טובה זה לא סתם."}, {"type": "image-row", "images": ["/doc-assets/image-184.png"]}, {"type": "paragraph", "text": "זהו עצב שמחבר בין המוח לכל האברים בגוף. זהו המוליך הוא ארוך מאוד מהמוח לאברי הבטן."}, {"type": "paragraph", "text": "אזור ראשוני ואזור אסוציאטיבי (לדעת איך מידע עובר באזורים הללו, בתפיסה ובמוטורי)"}, {"type": "image-row", "images": ["/doc-assets/image-185.png"]}, {"type": "paragraph", "text": "אזור ראשוני הוא בקשר ישיר עם הגוף הא מקבל מידע מהעיניים או מהריח או מהשמיעה A1 אזור ראיה ראשוני, V1"}]}, {"id": "topic-39", "title": "במידע חושי אנחנו הולכים ממידע חושי ואז עוברים לאזורים אסוציאטיביים. מה קורה במסלול המוטורי?", "blocks": [{"type": "image-row", "images": ["/doc-assets/image-186.png"]}, {"type": "paragraph", "text": "האזור הראשוני הוא בקשר ישיר עם הגוף כיוון התנועה הפעילות שלנו הולך כך"}, {"type": "image-row", "images": ["/doc-assets/image-187.png"]}, {"type": "paragraph", "text": "הפרימרי מוטור זה התחנה האחרונה של תכנון הפעולה."}, {"type": "paragraph", "text": "לחושים יש קולטנים המתרגמים גירויים פיזיים לאותות חשמליים"}, {"type": "paragraph", "text": "לחושים השונים יש קולטנים והם מתרגמים אותות חשמליים לגירויים פיזיים."}, {"type": "image-row", "images": ["/doc-assets/image-188.png"]}, {"type": "paragraph", "text": "העברת צד והזנחת צד"}, {"type": "image-row", "images": ["/doc-assets/image-189.png"]}, {"type": "paragraph", "text": "הזנחת צד – נגלקט . היא תופעה שקורית בעיקר בעקבות שבץ אירוע מוחי. אזור מאוד מסוים במוח שנפגע מה שקורה לאנשים שנפגעים מהזנחת צד הם מתעלמים או לא שמים לב לדברים שקושרים לצד שמאל זה יותר היכולת לשים את הקשב לצד שמאל זו לא בעיה מוטורית או בעיה בראיה. איך מזהים אומרים לאדם לצייר שעון והכל מתרכז בצד ימין. זה לא אדם שלא רואה הוא מתעלם או לא שם לב למה שמתרחש בצד שמאל. אם אני אפנה את תשומת ליבו זה יזכור רגעית זה יכול להיות אדם שאם ניתן לו יד בצד ימין הוא ירגיש בצד שמאל לא זו היכולת של המוח לשים לב למה שמתרחש בצד השמאלי. הפגיעה מתרחשת בדרך כלל באזור הקודקוד האחראית על התפיסה והקשב צד ימין אחראי על כל מה שקורה בצד שמאל וצד שמאל במוח אחראי על מה שקורה בצד ימין. נגלקט זוהי לא תופעה שכיחה ולקח המון זמן עד שנאספו מידע על התופעה. אפשר לשפר את המודעות לבעיה בעצם בהפניית תשומת הלב. הבעיה של נגלקט מתרחשת באונה הקודקודית."}, {"type": "image-row", "images": ["/doc-assets/image-190.png"]}, {"type": "paragraph", "text": "ליטרליזציה תפקודית"}, {"type": "image-row", "images": ["/doc-assets/image-191.png"]}]}, {"id": "topic-40", "title": "תהליכי top down / bottom up מה זה + דוגמאות", "blocks": [{"type": "image-row", "images": ["/doc-assets/image-192.png"]}]}, {"id": "topic-41", "title": "תהליכי bottom up דוגמה קריאה, האזנה לשיר", "blocks": [{"type": "paragraph", "text": "תהליכי top down דוגמה המוח מצליח להשלים אות שחסרה במילה מוכרת."}, {"type": "paragraph", "text": "ההומונקולוס ומה הוא מראה על ארגון המוח"}, {"type": "paragraph", "text": "ההומנקולוס מראה שהמוח הוא פרגמטי הוא משקיע משאבים לפי צורך תפקודי ולא לפי גיאוגרפיה של הגוף. זוהי מפת גוף על קליפת המוח ייצוג של כמה שטח קורטקס מוקדש לכל חלק בגוף."}, {"type": "image-row", "images": ["/doc-assets/image-193.png"]}]}, {"id": "topic-42", "title": "מערכת העצבים", "blocks": [{"type": "image-row", "images": ["/doc-assets/image-194.png"]}, {"type": "paragraph", "text": "מערכת העצבים היא רשת תקשורת עצבית מפותחת שבאמצעותה פועל הגוף כיחידה מבוקרת ומתואמת. מערכת עצבים קיימת כמעט בכל בעלי החיים."}, {"type": "paragraph", "text": "מערכת העצבים מקבלת ממערכות החישה מידע על גירויים בסביבה החיצונית והפנימית, מחליטה מה לעשות, ומשתמשת במידע זה על מנת לתכנן ולבצע פעולות, מודעות ולא מודעות."}, {"type": "paragraph", "text": "מערכת העצבים יודעת להסתגל לשינויים בסביבה וללמוד מטעויות."}, {"type": "paragraph", "text": "יש שתי חלוקות מערכת העצבים המרכזית ומערכת העצבים ההיקפית. ההיקפית זה כל מה שנכנס מבחוץ העינים רואות היד נוגעת וכו׳."}, {"type": "paragraph", "text": "נוירון סנסורי – עצבי קלט מעביר מידע מהגוף למוח"}, {"type": "paragraph", "text": "אינטרנוירון – נמצא בתוך מערכת העצבים המרכזית בלבד (מוח וחוט השדרה). הוא מתווך ומעבד בין הסנסורי למוטורי."}, {"type": "paragraph", "text": "נוירון מוטורי – עצבי פקודה הוא מעביר את הפקודות מהמוח לגוף."}, {"type": "image-row", "images": ["/doc-assets/image-195.png"]}, {"type": "image-row", "images": ["/doc-assets/image-196.png"]}, {"type": "paragraph", "text": "תפיסה של החושים אני צריכה לתפוס דברים, אני צריכה לחשוב זה פונקציות מופשטות חשיבה רגש זיכרון אני צריכה להפעיל תנועה רצונית אחרת לא אוכל לזוז והמואוסטזיס השמירה על איזון גופני אני צריכה להיות במצב שטוב לגוף שלי."}, {"type": "image-row", "images": ["/doc-assets/image-197.png"]}, {"type": "paragraph", "text": "אפשר לחלק את מערכת העצבים המרכזית שזה מוח וחוט השדרה ולחלק למערכת ההיקפית לחוט השדרה, באופן אמיתי חוט השדרה שייך למערכת העצבים המרכזית, אבל אי אפשר להבין את המערכת ההיקפית מבלי לדבר על חוט השדרה."}, {"type": "paragraph", "text": "חוט השדרה מחולק לשניים יש לי תנועות רצוניות סומטי גוף תנועת גופניות אבל יש לי אוטונומי שזה קורה אוטומטי. וגם הוא מתחלק לשניים"}, {"type": "image-row", "images": ["/doc-assets/image-198.png"]}, {"type": "paragraph", "text": "הסיפמפטי עסוק בהישרדות אלו מערכות המנוגדות אחת לשנייה לפעמים יש שם בעיות ביניהן הפרא סיפמפטטי היא המערכת שמעכלת ."}, {"type": "image-row", "images": ["/doc-assets/image-199.png"]}, {"type": "image-row", "images": ["/doc-assets/image-200.png"]}, {"type": "paragraph", "text": "חוט השדרה שנמצא בתוך עמוד השדרה"}, {"type": "image-row", "images": ["/doc-assets/image-201.png"]}, {"type": "paragraph", "text": "זה ממש העצבים שעוברים בתוך עמוד השדרה והם חיבור ישיר למוח ולכן קוראים לו מערכת העצבים המרכזית."}, {"type": "image-row", "images": ["/doc-assets/image-202.png"]}, {"type": "paragraph", "text": "רואים כמו תמונת פרפר מלמעלה"}, {"type": "image-row", "images": ["/doc-assets/image-203.png"]}, {"type": "image-row", "images": ["/doc-assets/image-204.png"]}, {"type": "image-row", "images": ["/doc-assets/image-205.png"]}, {"type": "paragraph", "text": "האפור זה התאים עצמם והלבן זה הדנדריטים. אקסונים הם נהיים מאוד מיאלין הקשרים בין התאים הללו הם קטנים והם לא צריכים הרבה מיאלין בעיקר אנחנו לא נראה את המיאלין בפנים."}, {"type": "image-row", "images": ["/doc-assets/image-206.png"]}, {"type": "paragraph", "text": "אפשר לדבר כבר מרמת נוירונים יש נוירון סנסורי הוא מתחבר לאיזה אינטנירון שעושה שיח עם רמת תא מוטורי . המידע צריך להגיע לנוירון סנסורי הוא שולח לאינטרנירון מסר."}, {"type": "image-row", "images": ["/doc-assets/image-207.png"]}, {"type": "image-row", "images": ["/doc-assets/image-208.png"]}, {"type": "image-row", "images": ["/doc-assets/image-209.png"]}, {"type": "paragraph", "text": "רפלקס היא תגובה אוטומטית הנשלטת בעיקר על ידי חוט השדרה ואזורים נמוכים במוח."}, {"type": "image-row", "images": ["/doc-assets/image-210.png"]}]}]};
    const firstSectionId = "topic-1";
    const initialActiveId = "topic-38";
    const topicBase = "../../";
    const rootHref = "../../index.html";
    const assetPrefix = "../../";
    let query = "";
    let activeId = initialActiveId;
    let isDense = false;

    const normalize = (value) => value.toLocaleLowerCase("he-IL").trim();
    const sectionText = (section) => [
      section.title,
      ...section.blocks.map((block) => block.type === "paragraph" ? block.text : "")
    ].join(" ");
    const filtered = () => {
      const q = normalize(query);
      if (!q) return content.sections;
      return content.sections.filter((section) => normalize(sectionText(section)).includes(q));
    };
    const escapeHtml = (value) => value
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;");
    const topicHref = (id) => id === firstSectionId ? rootHref : `${topicBase}${id}/`;

    function renderTopicLink(section, index, compact = false) {
      const link = document.createElement("a");
      link.className = section.id === activeId ? "active" : "";
      link.href = topicHref(section.id);
      if (compact) {
        link.textContent = String(index + 1);
      } else {
        link.innerHTML = `<span>${String(index + 1).padStart(2, "0")}</span>${escapeHtml(section.title)}`;
      }
      return link;
    }

    function render() {
      const sections = filtered();
      const active = sections.find((section) => section.id === activeId) || sections[0];
      if (active) activeId = active.id;

      for (const [id, compact] of [["topicList", false], ["mobileTopics", true], ["topicMap", false]]) {
        const target = document.getElementById(id);
        target.innerHTML = "";
        sections.forEach((section, index) => target.appendChild(renderTopicLink(section, index, compact)));
      }

      document.getElementById("comfortable").className = isDense ? "" : "selected";
      document.getElementById("dense").className = isDense ? "selected" : "";
      const card = document.getElementById("studyCard");
      card.className = isDense ? "study-card dense" : "study-card";

      if (!active) {
        card.innerHTML = "<h2>לא נמצאו תוצאות</h2><p>כדאי לנסות מילת חיפוש קצרה יותר או מושג אחר מהחומר.</p>";
        return;
      }

      const topicNumber = content.sections.findIndex((section) => section.id === active.id) + 1;
      const blocks = active.blocks.map((block) => {
        if (block.type === "paragraph") return `<p>${escapeHtml(block.text)}</p>`;
        return `<div class="image-grid">${block.images.map((image) => {
          const src = assetPrefix + image.replace(/^\//, "");
          return `<figure><img loading="lazy" alt="תמונה מתוך הסיכום: ${escapeHtml(active.title)}" src="${src}"></figure>`;
        }).join("")}</div>`;
      }).join("");

      card.innerHTML = `<div class="section-kicker">נושא ${topicNumber}</div><h2>${escapeHtml(active.title)}</h2><div class="content-flow">${blocks}</div>`;
    }

    document.getElementById("search").addEventListener("input", (event) => {
      query = event.target.value;
      render();
    });
    document.getElementById("comfortable").addEventListener("click", () => {
      isDense = false;
      render();
    });
    document.getElementById("dense").addEventListener("click", () => {
      isDense = true;
      render();
    });
    render();
  </script>
