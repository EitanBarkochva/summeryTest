<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>סיכום למבחן בנוירוביולוגיה</title>
  <style>


:root {
  --ink: #182021;
  --muted: #5f6f71;
  --paper: #fbfaf6;
  --panel: #ffffff;
  --line: #d9e0dc;
  --accent: #0b766d;
  --accent-dark: #064e49;
  --warm: #f2c45b;
  --rose: #b84f6b;
  --shadow: 0 22px 60px rgba(24, 32, 33, 0.12);
}

* {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  min-height: 100vh;
  margin: 0;
  background:
    linear-gradient(90deg, rgba(11, 118, 109, 0.08), transparent 36%),
    linear-gradient(180deg, #eef5f1 0%, var(--paper) 42%, #f7f1e6 100%);
  color: var(--ink);
  font-family: Arial, "Noto Sans Hebrew", "Segoe UI", sans-serif;
}

button,
input {
  font: inherit;
}

button {
  cursor: pointer;
}

a {
  color: inherit;
  text-decoration: none;
}

.study-shell {
  display: grid;
  grid-template-columns: minmax(280px, 340px) minmax(0, 1fr);
  min-height: 100vh;
}

.topic-rail {
  position: sticky;
  top: 0;
  display: flex;
  flex-direction: column;
  gap: 18px;
  height: 100vh;
  padding: 28px 22px;
  border-left: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.88);
  backdrop-filter: blur(18px);
}

.rail-brand {
  display: flex;
  align-items: center;
  gap: 12px;
}

.brand-mark {
  display: grid;
  width: 48px;
  height: 48px;
  place-items: center;
  border-radius: 8px;
  background: var(--accent);
  color: white;
  font-weight: 800;
}

.rail-brand p,
.rail-brand strong {
  display: block;
  margin: 0;
}

.rail-brand p {
  color: var(--muted);
  font-size: 0.88rem;
}

.rail-brand strong {
  font-size: 1.15rem;
}

.search-box {
  display: grid;
  gap: 8px;
}

.search-box span {
  color: var(--muted);
  font-size: 0.9rem;
  font-weight: 700;
}

.search-box input {
  width: 100%;
  min-height: 44px;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 0 14px;
  background: #f8fbf8;
  color: var(--ink);
  outline: none;
}

.search-box input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(11, 118, 109, 0.14);
}

.rail-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.rail-stats span {
  min-height: 48px;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 8px;
  background: #fbfcfa;
  color: var(--accent-dark);
  font-size: 0.82rem;
  font-weight: 800;
  text-align: center;
}

.topic-list {
  display: flex;
  flex: 1;
  flex-direction: column;
  gap: 8px;
  overflow: auto;
  padding-left: 4px;
}

.topic-list a,
.all-topics a {
  display: grid;
  grid-template-columns: 34px 1fr;
  align-items: center;
  gap: 10px;
  width: 100%;
  border: 1px solid transparent;
  border-radius: 8px;
  padding: 10px;
  background: transparent;
  color: var(--ink);
  text-align: right;
}

.topic-list a span,
.all-topics a span {
  color: var(--accent);
  font-size: 0.82rem;
  font-weight: 800;
}

.topic-list a.active,
.topic-list a:hover,
.all-topics a:hover {
  border-color: rgba(11, 118, 109, 0.22);
  background: #eaf4ef;
}

.study-main {
  display: grid;
  gap: 26px;
  width: min(100%, 1180px);
  margin: 0 auto;
  padding: 32px;
}

.hero-panel {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  align-items: end;
  gap: 22px;
  padding: 36px;
  border: 1px solid rgba(11, 118, 109, 0.15);
  border-radius: 8px;
  background:
    linear-gradient(135deg, rgba(11, 118, 109, 0.14), rgba(242, 196, 91, 0.18)),
    #ffffff;
  box-shadow: var(--shadow);
}

.eyebrow,
.section-kicker {
  margin: 0 0 8px;
  color: var(--rose);
  font-size: 0.86rem;
  font-weight: 800;
}

.hero-panel h1,
.study-card h2,
.all-topics h2,
.empty-state h2 {
  margin: 0;
  color: var(--accent-dark);
  letter-spacing: 0;
}

.hero-panel h1 {
  max-width: 780px;
  font-size: clamp(2.1rem, 4vw, 4rem);
  line-height: 1.05;
}

.hero-panel p:not(.eyebrow) {
  max-width: 760px;
  margin: 16px 0 0;
  color: var(--muted);
  font-size: 1.05rem;
  line-height: 1.8;
}

.hero-actions {
  display: flex;
  gap: 8px;
  padding: 6px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: white;
}

.hero-actions button {
  min-height: 42px;
  border: 0;
  border-radius: 6px;
  padding: 0 14px;
  background: transparent;
  color: var(--muted);
  font-weight: 800;
  white-space: nowrap;
}

.hero-actions button.selected {
  background: var(--accent);
  color: white;
}

.mobile-topic-strip {
  display: none;
}

.study-card,
.empty-state,
.all-topics {
  border: 1px solid rgba(24, 32, 33, 0.1);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.94);
  box-shadow: 0 16px 40px rgba(24, 32, 33, 0.08);
}

.study-card {
  padding: 34px;
}

.study-card h2 {
  font-size: clamp(1.55rem, 3vw, 2.4rem);
  line-height: 1.25;
}

.content-flow {
  display: grid;
  gap: 18px;
  margin-top: 24px;
}

.content-flow p {
  margin: 0;
  color: #253133;
  font-size: 1.08rem;
  line-height: 2;
}

.study-card.dense .content-flow {
  gap: 10px;
}

.study-card.dense .content-flow p {
  font-size: 1rem;
  line-height: 1.65;
}

.image-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(min(100%, 260px), 1fr));
  gap: 14px;
  margin: 8px 0;
}

figure {
  margin: 0;
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #f7f8f5;
}

img {
  display: block;
  width: 100%;
  height: auto;
}

.empty-state {
  padding: 34px;
}

.empty-state p {
  color: var(--muted);
}

.all-topics {
  padding: 24px;
}

.all-topics h2 {
  margin-bottom: 16px;
  font-size: 1.35rem;
}

.all-topics div {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 8px;
}

@media (max-width: 980px) {
  .study-shell {
    grid-template-columns: 1fr;
  }

  .topic-rail {
    position: static;
    height: auto;
    border-left: 0;
    border-bottom: 1px solid var(--line);
  }

  .topic-list {
    display: none;
  }

  .study-main {
    padding: 22px;
  }

  .hero-panel {
    grid-template-columns: 1fr;
    padding: 26px;
  }

  .mobile-topic-strip {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
  }

  .mobile-topic-strip a {
    display: grid;
    flex: 0 0 42px;
    height: 42px;
    place-items: center;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: white;
    color: var(--accent-dark);
    font-weight: 800;
  }

  .mobile-topic-strip a.active {
    border-color: var(--accent);
    background: var(--accent);
    color: white;
  }
}

@media (max-width: 620px) {
  .topic-rail {
    padding: 18px;
  }

  .rail-stats {
    grid-template-columns: 1fr;
  }

  .study-main {
    padding: 16px;
  }

  .hero-panel,
  .study-card,
  .empty-state,
  .all-topics {
    padding: 20px;
  }

  .hero-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
  }

  .content-flow p {
    font-size: 1rem;
    line-height: 1.85;
  }
}

  </style>
</head>

  <script>
    const content = {"title": "סיכום למבחן בנוירוביולוגיה", "sourceFile": "סיכום למבחן בבנוירוביולוגיה.docx", "stats": {"sections": 42, "paragraphs": 296, "images": 210}, "sections": [{"id": "topic-1", "title": "מבוא לנוירופדגוגיה, מודל UDL , מערכת הרגש / שלוש מערכות המוח לפי מודל UDL", "blocks": [{"type": "image-row", "images": ["/doc-assets/image-001.png"]}]}, {"id": "topic-2", "title": "מי זה אנטוניו דמסיו, מה אמר?", "blocks": [{"type": "paragraph", "text": "אנטוניו דמסיו הוא נירולוג ומדען מוח פורטוגזי אמריקאי מפורסם, הוא פרופסור באוניברסיטת דרום קליפורניה. הוא אחד החוקרים החשובים בעולם בתחום התודעה הרגש והמוח. המשפט שאמר"}, {"type": "image-row", "images": ["/doc-assets/image-002.png"]}]}, {"id": "topic-3", "title": "מה זה סינכרון מוחי (המחקר של אורי חסון) / מה קורה במוח שלנו שאנחנו שומעים סיפור טוב או רואים סיפור טוב?", "blocks": [{"type": "paragraph", "text": "המחקר של אורי חסון היה מאחד החוקרים הראשונים החליט להשתמש במצבים טבעיים במעמד אומנם אבל זה היה מאוד ייחודי אז, הוא עשה ניסוי קטן ואלגנטי הוא לקח אנשים ונתן להם לספר סיפור רגשי טוב ועסיסי בזמן שהם שוכבים במכשיר FMRI שעושה שדה מגנטי שמתממשים בו למטרות רפואיות. והוא בעצם סוקר את הפעילות המוחית בזמן אמת המכשיר עושה פרוסות של המוח הכתמים הכתומים מראים שיש יותר פעילות מוחית בהשוואה לביקורת וכתמים ירוקים מראים שיש פחות פעילות בהשוואה לתנאי ביקורת. בעצם אנו יכולים לראות איזה חלקים במוח פעילים יותר בזמן הסיפור. הוא הקליט את הסיפורים ונתן לאנשים אחרים להקשיב לסיפורים של אנשים אחרים."}, {"type": "paragraph", "text": "אם אני מעורב רגשית סיפור של מישהו אחר אדם יכול לעורר את העניין והסקרנות שלי יכול להיווצר תיאום בין שני המוחות. ככל שמידת ההתאמה גדולה יותר כך השומע מבין טוב יותר וזוכר טוב יותר את היספור. אני כמורה חייבת לדאוג ביני כדוברת בכיתה לבין הילדים בכיתה אם אין סנכרון מוחי הילדים מבינים פחות וזוכרים פחות בשיעור. בזום הרבה יותר קשה ליצור את הסנכרון המוחי. אם הסיפור שובש ואין רצף אז לא תהיה התאמה בין המוחות של הדובר והמאזין ואז נזכור פחות."}, {"type": "image-row", "images": ["/doc-assets/image-003.png"]}]}, {"id": "topic-4", "title": "אמיגדלה + תפקיד היפוקמפוס + תפקיד", "blocks": [{"type": "image-row", "images": ["/doc-assets/image-004.png"]}, {"type": "paragraph", "text": "הירוק הקטן – אמיגדלה היא מעבדת רגשות ומזהה מצבי סכנה. ההיפוקמפוס יושב במערכת הלימבית הרגשית והוא חיוני ללמידה. אם מוציאים אותו לא זוכרים כלום. הוא יושב מתחת לאמיגדלה. הם מאוד קרובים אחד לשני ומה זה אומר לנו? הרגש הוא המפתח ללמידה. חוויות רגשיות אני זוכרת אבל חוויות טראומטיות לרוב נשאר כזיכרון עמוק."}, {"type": "paragraph", "text": "האמיגדלה עובדת באופן מידי ולא רצוני . אם האמיגדלה רואה משהו שמלחיץ אותה או מפחיד אותה היא מגיבה מידית באופן הישרדותי. היא אומרת להיפוקמפוס תשמע אנחנו לומדים שצריך לברוח מהסיטואציה מסוימת או להתמודד איתה. האמיגדלה שסוגרת את ההיפוקמפוס ובמצב כזה אין אפשרות ללמוד."}, {"type": "paragraph", "text": "מסלול גבוה, מסלול נמוך (לדעת לצייר תרשים בסיסי)"}, {"type": "image-row", "images": ["/doc-assets/image-005.png"]}, {"type": "paragraph", "text": "המסלול הקצר יותר הוא המסלול שעובר ישר לאמיגדלה, המסלול הארוך עובר קודם בקורטקס. אם יש לנו צרה המסלול של מערכת הלימבית הוא בכל המוח מהיר וחזק, המסלול של הקורטקס איטי יותר. אם לוקחים ילד בן שנתיים והוא רוצה משהו מסוים והוא חווה טנטרום כי האונה המצחית לא מפותחת מספיק. גיל ההתבגרות הוא בעייתי ההורמונים מפריעים לאיזון הכימי וזה יעובד על המערכת הלימבית אני מחפשת זהות וישנה סערת רגשות והאונה המצחית שלי היא בגיל 12 אבל המערכת הרגשית שלי מתמודדת עם בעיות של מבוגרים. יש פער ענק ביניהן. כל העניין החברתי נמצא מעל המערכת הרגשית אבל קרוב לקורטקס. יש עוד גיל שזה קורה בזקנה יש להם בעיה רגשית פתאום הם לא יודעים לוווסת את עצמם. האונה הקדם מצחית יורדת בפעילות והמערכת הלימבית שוב בפעולה. אנחנו כמורים יכולים להשפיע על ילדים לווסת את עצמם. בכל גיל ניתן לחזק את הקשר בין מערכת הניהול למערכת הרגש."}, {"type": "image-row", "images": ["/doc-assets/image-006.png"]}]}, {"id": "topic-5", "title": "דרכי הרגעה לאמיגדלה (דוגמה לכלי של שיום ולכלי הרגעה בעזרת הגוף)", "blocks": [{"type": "image-row", "images": ["/doc-assets/image-007.png"]}, {"type": "image-row", "images": ["/doc-assets/image-008.png"]}, {"type": "image-row", "images": ["/doc-assets/image-009.png"]}, {"type": "image-row", "images": ["/doc-assets/image-010.png"]}, {"type": "image-row", "images": ["/doc-assets/image-011.png"]}, {"type": "paragraph", "text": "כלי של שיום זה משהו שעולה אם רואים ילדים שעולים מאפס למאה הם בפיצוץ. מה עושים עם הילדים צריך לתרגל איתם מה אני מרגיש? ומבקשת מהילדים שיתנו לי שם לכל רמה. בתוך הכיתה יהיו דיונים האם זה כועס או רגזן. הגברתי את המודעות לרגשות ומאפשרת לעצמי יותר אפשרות להשאיר את המידע האונה מצחית בקורטקסט."}, {"type": "image-row", "images": ["/doc-assets/image-012.png"]}, {"type": "paragraph", "text": "אני יכולה להרגיע את האמיגדלה דרך הגוף כי לאמיגדלה יש קשר לגוף אז ייתכן שהגוך יכול להרגיע את האמיגדלה. הגוף חייב לפעול כדי להצליח את הדבר הזה אחרת לא יקרה כלום."}, {"type": "paragraph", "text": "דוגמה לכלי הרגעה בעזרת הגוף – שיטת הפרח והנר תרגול בעזרת נשימות."}]}, {"id": "topic-6", "title": "מי זה HM ?", "blocks": [{"type": "image-row", "images": ["/doc-assets/image-013.png"]}, {"type": "paragraph", "text": "הנרי מולייסון קיבל אפילפסיה בגיל 27 הגיע למצב קשה שכל הזמן חווה התקפים- אפילפסיה זה כל מיני קצרים חשמליים במוח. הוא הגיע למצב של 4-5 התקפים ביום. בסביבות שנות ה-50 ולא היו תרופות. הוא הגיע לרופא כירורג ויליאם סקוביל. הוא אמר להנרי שהוא רואה פגיעה בהיפוקמפוס אמר לו שהוא יוציא לו את ההיפוקמפוס שאין לו כל כך משמעות וההתקפים יפסיקו. לאחר הניתוח האחות ניגשה אליו ולאחר שנכנסה בפעם השנייה הוא לא זכר מי היא. הוא איבד את היכולת לייצר זיכרון חדש הכל נעלם לו. הנרי הוא האיש שגרם לנו להבין את הזיכרון. הנרי מוליסון היה חשוב בחקר המוח של הפסיכולוגיה הקוגנטיבית."}]}, {"id": "topic-7", "title": "מעגל הרגש והלמידה", "blocks": [{"type": "image-row", "images": ["/doc-assets/image-014.png"]}, {"type": "paragraph", "text": "כשיש לנו חוויה שלילית משהו קטן שקרה בעקבות כך יש לנו זיכרון שלילי, זה יוצר לנו פחד ולחץ וממילא יש לנו חוסר מסוגלות. וחוזר שוב זה כמו בורג שמכניסים פנימה עד שהתלמיד נמצא במקום שהוא לא איתנו. האמיגדלה היא אחד מחלקים במערכת הלימבית והיא חלק ממערכת מאוד ישנה, אם אני לא לומד מה מסוכן לי אני לא יכול לברוח אם יש לי האמיגדלה מתפקדת אני יכולה להתמודד. הרבה פעמים הטראומה נמצאת בתת מודע אבל ברגע שהיא נמצאת במודע בקורטקס יותר קל לטפל בזה."}, {"type": "paragraph", "text": "כשיש לנו חוויה חיובית יש לי זיכרון חיובי יש לי עלייה ביכולת ופניות ללמידה היא רגועה ויש לי תחושת מסוגלות ושוב חוזר חלילה. איפה התלמיד שלי נמצא במעגלים? אני מנסה לחשוב מה אני יכולה לעשות כדי לפתור את הבעיה הזו."}]}, {"id": "topic-8", "title": "מודל ה U ההפוכה של סטרס", "blocks": [{"type": "image-row", "images": ["/doc-assets/image-015.png"]}, {"type": "paragraph", "text": "לא כל מתח חייב להיות מתח שלילי."}]}, {"id": "topic-9", "title": "מי זה פסנקפ?", "blocks": [{"type": "paragraph", "text": "החוקר פנסקפ הוא גילה שיש מערכת הרגש שבעה רגשות בסיסים שהם שולטים על המוח עוד הרבה לפני שידענו הרבה על המוח."}, {"type": "image-row", "images": ["/doc-assets/image-016.png"]}, {"type": "image-row", "images": ["/doc-assets/image-017.png"]}]}, {"id": "topic-10", "title": "מערכת הלמידה וזיכרון / פלסטיות מוחית מה מתרחש ברמת הסינפסה/ התא וברמה מערכתית, ברמה בסיסית", "blocks": [{"type": "image-row", "images": ["/doc-assets/image-018.png"]}, {"type": "image-row", "images": ["/doc-assets/image-019.png"]}, {"type": "image-row", "images": ["/doc-assets/image-020.png"]}, {"type": "image-row", "images": ["/doc-assets/image-021.png"]}, {"type": "paragraph", "text": "הקשרים בין תאי העצב יכולים להתחזק או להיחלש וזה הבסיס ללמידה."}, {"type": "paragraph", "text": "הקשרים המומנים באדום וירוק הם מתחזקים ובפעם הבאה אם אני לא אראה את הקו כנראה אני צריך להשלים את המידע הזה."}, {"type": "image-row", "images": ["/doc-assets/image-022.png"]}, {"type": "paragraph", "text": "כשיש פעילות אינטנסיבית בין שני תאי עצב נוצרת בינהם קשר הדוק והדדי. ככל שיש יותר מיאלין הקשר יותר חזק, יותר מיאלין הוא יותר חזק. הסינפסה זה הקשר בין הנוירונים הוא יכול להתחזק או להיחלש. אם הקשר נחלש הם פחות מדברים אחד עם השני אם הוא מתחזק אז הם מדברים יותר אחד עם השני."}, {"type": "paragraph", "text": "יש שני שיוניים שיכולים להתרחש בסינפסה אחד זה החוזק והכמות. זה לא משנה אם אני ילד שלומד או שהוא בעל חיים שלומד לכולם רואים שיש שינויים בסינפסה."}, {"type": "image-row", "images": ["/doc-assets/image-023.png"]}, {"type": "image-row", "images": ["/doc-assets/image-024.png"]}, {"type": "paragraph", "text": "ltp בעברית קוראים לזה הגברה סינפטית ארוכת טווח. חיזוק הסינפסה ארוכת טווח הסינפסה שינתה את החוזק שלה לאורך זמן."}, {"type": "paragraph", "text": "השאלה היא אם יש רק ltp או שיש גם את הכיוון ההפוך? נגיד שאני בלמידה אנטי הבינאית אני רוצה להכחיד זה נקרא ltd"}, {"type": "paragraph", "text": "זה משהו שקורה בלמידה די מהר, אם חוזרים הביתה וחוזרים על החומר יכול להיות שאחזור על החומר אני אולי אדע את כל החומר. אם אני עושה עוד כזה הוא עושה עוד שינוי בסינפסה הוא משנה את הכמות של הסינפסות."}, {"type": "image-row", "images": ["/doc-assets/image-025.png"]}, {"type": "paragraph", "text": "אדום זה הפרא, הסגול זה הפוט. מי שנותן את האות סה תמיד הפרא סינפטי."}, {"type": "paragraph", "text": "סנסיטיזציה – רעש שלא מתרגלים אליו."}, {"type": "paragraph", "text": "היבטואיציה – משהו שעאפשר להתרגל אליו."}, {"type": "paragraph", "text": "בהמשך הבינו שכל הלמידה במוח מתרחשת כך יצירת הסינפסות זו אחת הדרכים שאני לומדת."}]}, {"id": "topic-11", "title": "הסיפור של חיזוק סינפסי וכמות הסינפסות איפה זה מתרחש?", "blocks": [{"type": "image-row", "images": ["/doc-assets/image-026.png"]}, {"type": "paragraph", "text": "בגרעין התא אני מייצרת קולטנים ומשנע אותם על. גבי הדנטירט ויש עוד כמה קולטנים, אם אני צריך לבנות חומר אפשר לעשות את זה מידי? לא זה לוקח זמן וזו הסיבה שלמידה ארוכת טווח לוקחת זמן. התא שלי צריך להכין את החומרים הללו הוא צריך זמן ליצור עוד סינפסה שלמה זה המון עבודה."}, {"type": "paragraph", "text": "בגרעין התא מיוצרים החומרים שאני צריכה כדי לבנות את החומרים הללו."}, {"type": "image-row", "images": ["/doc-assets/image-027.png"]}, {"type": "paragraph", "text": "ככל שהזמן עובר מגלים יותר על תאי הגליה שהן שולחים את הלשונות שלהם על האקסון והם משנים את המהירות של האות עובי המיאלין."}]}, {"id": "topic-12", "title": "למידה הביאנית ולמידה אנטי הביאנית", "blocks": [{"type": "paragraph", "text": "חוק הב: נוירונים שיורים יחד יתחברו יחד. אם כל פעם שנוירון נדלק והשני נדלק הם מבינים שהם שייכים יחד והם נדלקים יחד."}, {"type": "paragraph", "text": "תאי עצב או נוירונים הם אבני הבניין של המוח. הם מייצרים קשרים ורשתות העומדים בבסיס היכולות השונות של המוח. למידה אנטי הביאנית נוירונים יורים יחד מתנתקים יחד, כשיש פעילות משותפת הסינפסה נחלשת. המוח מסנן קורלציות רועשות ומדכא חיבורים לא רלוונטים."}, {"type": "image-row", "images": ["/doc-assets/image-028.png"]}]}, {"id": "topic-13", "title": "גיזום סינפטי, מה זה מתי בעיקר מתרחש? (גיל)", "blocks": [{"type": "image-row", "images": ["/doc-assets/image-029.png"]}, {"type": "paragraph", "text": "התמונה השמאלית ילד שנולד התמונה אמצעית שהוא בן 6 התמונה הימנית הוא בן 14 מדובר על אותו ילד. למה המוח צריך לעשות גיזום? אצל ילדים קטנים שאנו שואלים אותם שאלות הם מקשרים את הכל להכל. מצד שני אנו רוצים שהיו אנשים עם רשת יותר מסודרת ולא הכל נקשר להכל. קשרים שאני משתמשת בהם מתחזקים ומה שאני לא משתמשת נחלשים. זה נקרא גיזום סינפטי. אם אני אקח ילד שהוא טוב במוזיקה אני אלמד אותו עד גיל 6 מוזיקה וכך ייווצרו קשרים חזקים יותר אבל ייתכן וזה יבוא על כישורים אחרים. בכל גיל ניתן ליצור מסלולים חדשים אבל זה יותר קשה. אפשר לעבוד על המודעות שאני יכולה לשנות את המוח שלי עם המון תרגול של חזרה ושמע."}]}, {"id": "topic-14", "title": "הקניית אוריינות כדוגמה לחיזוק קשרים. ברמה המערכתית, קשר למשימת סטרופ כהדגמה לזה", "blocks": [{"type": "paragraph", "text": "כדי ללמוד לקרוא אני צריכה לפחות אזורים במוח המזהים אותיות, אזורים במוח המפיקים קול שאני יודעת שהאות עושה צליל מסוים ואזורים המבינים את המשמעות של המילים. כל ילד שמתחיל לקרוא הוא חוזר מספר פעמים על הצלילים ומחבר אותם יחד."}, {"type": "image-row", "images": ["/doc-assets/image-030.png"]}, {"type": "paragraph", "text": "אני חייבת את החיבורים בין האזורים אחרת. זה לא יעבוד אם פותחים את המוח ומסתכלים במבט מידי אני יכולה לראות את הקשרים הללו את החומר הלבן שמחבר בין האזורים הללו. אני יכולה לראות את החומר הלבן גם באמצעות תמונה של FMRI ."}, {"type": "image-row", "images": ["/doc-assets/image-031.png"]}, {"type": "paragraph", "text": "במטלת סטרופ מבקשים ממני לומר את הצבע שהמילה כתובה ולא לקרוא את המילה הכתובה, במטלה כזו עליי לערב מספר אזורים במוח על מנת להצליח במשימה."}]}, {"id": "topic-15", "title": "שלושת הכללים ללמידה יעילה (לחבר, לתרגל דו כיווני, הפסקות)", "blocks": [{"type": "image-row", "images": ["/doc-assets/image-032.png"]}]}, {"id": "topic-16", "title": "שלושה כללים על למידה:", "blocks": [{"type": "paragraph", "text": "ללמוד זה לחבר – בתמונה זו רשת נירונים שיש בה חיבורים אבל לא חזרים עדיין. בתמונה הימנית אני רוצה ליצור את הקשרים שיהיו חזקים יותר אני מעצבת את חווית הלמידה."}, {"type": "image-row", "images": ["/doc-assets/image-033.png"]}, {"type": "paragraph", "text": "יש פה נוירון שהוא הולך על האות א׳ בהמשך יש את ב׳ ג׳ ד׳ בהתחלה לילד קטן הכל קשור להכל וככל שהקשר מתחזק נעשה גיזום ואז אני לא צריכה לזכור את הקשר בין א לג׳."}, {"type": "paragraph", "text": "כדי ששני הונירונים יתקשרו בינהם ויחזקו את הקשר אני צריכה להפעיל את שינהם. אם לא הפעלתי את הידע הקודם אני לא אוכל לקלוט את הידע החדש."}, {"type": "image-row", "images": ["/doc-assets/image-034.png"]}, {"type": "image-row", "images": ["/doc-assets/image-035.png"]}, {"type": "paragraph", "text": "לא מספיק לברר מה הידע הקודם. כל המוחות כל הזמן שכולם יהיו איתנו בלמידה בו זמנית. אני צריכה להפעיל את הידע הקודם.. איך אני מלמדת להרכיב פאזל אני מלמדת אותו קודם כל את המסגרת. ילדים חייבים את המסגרת רגש למידה ניהול בלי מסגרת הלימוד לא יעבוד. אני חייבת לחבר את הידע לעוד ידע."}, {"type": "image-row", "images": ["/doc-assets/image-036.png"]}, {"type": "paragraph", "text": "למידה חייבת להיות דו כיוונית : אם יצרתי קשר בין א׳ לב׳ הוא יכול לעביר את המידע הלאה לא יצרתי את הקשר בין ב׳ לא׳ ."}, {"type": "image-row", "images": ["/doc-assets/image-037.png"]}, {"type": "image-row", "images": ["/doc-assets/image-038.png"]}, {"type": "paragraph", "text": "אם למדתי רק בכיוון אחד זה לא יעבוד."}, {"type": "image-row", "images": ["/doc-assets/image-039.png"]}, {"type": "image-row", "images": ["/doc-assets/image-040.png"]}, {"type": "paragraph", "text": "תרגילי שליפה עוזרים משמעותית לשיפור הלמידה."}]}, {"id": "topic-17", "title": "למידה לוקחת זמן:", "blocks": [{"type": "image-row", "images": ["/doc-assets/image-041.png"]}, {"type": "paragraph", "text": "למידה זה תהליך ביולוגי וזה כמו בניית שרירים. בלי הפסקה התהליך של יצירת מיאלין ויצירת סינפסה לא יכול לקרות."}, {"type": "paragraph", "text": "ההיפוקמפוס מעביר את הזיכרון אבל מה קורה לו בזמן שינה? ההיפוקמפוס משחזר את אירועי היום וכך הוא זוכר אותם. לא כדאי לשים בלילה מוזיקה או שמע חזרתי כל הלילה כי זה מפריע להיפוקמפוס לשחזר את אירועי היוןם"}]}, {"id": "topic-18", "title": "שחזור ההיפוקמפוס – hippocampal replay", "blocks": [{"type": "image-row", "images": ["/doc-assets/image-042.png"]}]}, {"id": "topic-19", "title": "למידה מרווחת, מה זה? מה ההבדל בין זה ללמידה עם הפסקות?", "blocks": [{"type": "image-row", "images": ["/doc-assets/image-043.png"]}, {"type": "paragraph", "text": "קבוצת תלמידים שהיו צריכים ללמוד כמות חומר גדולה לקראת מבחן מי שכתב את המאמר זה המנהל והחוקר. הם בעצם נתנו לילדים ללמוד המון חומר במשך 20 דקות נותנים להם הפסקה, שוב פעם לומדים 20 דקות חזרה עם שאלות לאחר מכן הפסקה של 10 דקות ובסוף חזרה 20 דקות. זה בדוק יותר טוב מאשר ללמוד 60 דקות רצוף. זה דורש אבל הכנה קפדנית."}, {"type": "image-row", "images": ["/doc-assets/image-044.png"]}, {"type": "paragraph", "text": "הפסקות מוח לא ממש עוזרות לזיכרון אבל הן עוזרות לריענון מערכת הקשב והבקרה."}]}, {"id": "topic-20", "title": "מה זה זיכרון עבודה: תפקידים, שלושת המרכיבים", "blocks": [{"type": "image-row", "images": ["/doc-assets/image-045.png"]}, {"type": "paragraph", "text": "מה הבעיה עם זיכרון? מי חקר אותו? פסיכולוגים קוגניטיביים הם אמרו שאנחנו לא מבינים כלום מהמוח ואנחנו יכולים לחקור את זה התנהגותית. אין אזור שקוראים לו זיכרון עבודה אולי זה ההיפוקמפוס אבל שמנסים להסביר מזה זיכרון עבודה מבינים שהוא לא קשור להיפוקמפוס. לפעמים המודלים לא יושבים אחד עם השני. אומרים שהתהליכים של זיכרון העבודה יושבים באונה הקדם מצחית וגם באזורי חישה וגם בהיפוקמפוס המודלים לא יושבים טוב אחד עם השני."}, {"type": "paragraph", "text": "זיכרון חושי הוא של כמה שניות, זיכרון עבודה הוא לעשר דקות ומה אני מחליטה לאחסן עובר לזיכרון לטווח הארוך. ישנם שלושה סוגים של זיכרון עבודה:"}, {"type": "image-row", "images": ["/doc-assets/image-046.png"]}, {"type": "paragraph", "text": "תנועתי שמיעתי – הלולאה הפונולוגית ראייתי – לוח חזותי מרחבי."}, {"type": "paragraph", "text": "המאגר האפיזודי משלב את המידע מהלולאה הפונולוגית והלוח החזותי מרחבי והזיכרון לטווח הארוך ויותר בעצם תמונה אחת מלוכדת, הוא הגשר בין זיכרון העבוה לזיכרון לטווח הארוך. ללא המאגר האפיזודי היינו שומעים מילים ורואים תמונה אך הן לא היו מחוברות יחד ."}, {"type": "paragraph", "text": "אפקט הראשוניות ואפקט האחרוניות (primacy and recency effect )"}, {"type": "image-row", "images": ["/doc-assets/image-047.png"]}, {"type": "paragraph", "text": "מה זה עומס קוגנטיבי, עומס פנימי (intrinsic load ) עומס מיותר ( extraneous load ) עומס יעיל (germane load)"}, {"type": "paragraph", "text": "עומס יתר על זיכרון העבודה מייצר תחושת לחץ וגורם לחוסר תפקוד. עומס בזיכרון העבודה הוא הגורם המרכזי בקשיי תפקוד ולמידה אצל כלל האוכלוסיה ובעלי לקויות למידה בפרט."}, {"type": "image-row", "images": ["/doc-assets/image-048.png"]}, {"type": "paragraph", "text": "תיאוריה של סוודר תומס והוא אמר שיש שלושה סוגים של עומס הוא קשור למורכות החומר יש עומס חיצוני שהוא מיותר לחלוטין ולא תורם ללמידה כרגע ויש עומס יעיל שזה המאמץ המוקדש ללמידה האמיתית החשיבה שאני עושה אם אני חושבת על החומר אני אזכור אותו אם אני לא חושבת על זה אני לא אזכור את זה."}, {"type": "image-row", "images": ["/doc-assets/image-049.png"]}, {"type": "paragraph", "text": "אם אני לא חשובת על דברים אני לא אזכור אותם זה יעלם רק אם אני אחשוב על דברים אני אזכור אותם. העומס היעיל זה העומס שאני שמה על תלמיד כדי שילמד את מה שאני רוצה עכשיו."}]}, {"id": "topic-21", "title": "מי זה קארל לאשלי ומה הוא חיפש?", "blocks": [{"type": "image-row", "images": ["/doc-assets/image-050.png"]}, {"type": "image-row", "images": ["/doc-assets/image-051.png"]}, {"type": "paragraph", "text": "לאשלי היה נוירופסיכולוג אמריקאי והוא אחד מחוקרי המוח הגדולים של המאה ה-20, הוא רצה למצוא את האנרגרם שזה המיקום הפיזי של הזיכרון במוח. הוא שאל שאלה פשוטה היכן בדיוק במוח מאוחסן הזיכרון. הוא לקח עכבר וניסה ללמד אותו ללכת במבוך ואז לוקח את עכבר פורס לו את המוח ורואה או שהוא זוכר או לא, במשך 30 שנה הוא עשה מחקרים כאלה אבל הוא אמר שהוא לא הצליח כלום ובלמידה ההיביהנית אמר שהזיכרון נמצא בכל מיני אזורים ולא רק באוזר אחד."}]}, {"id": "topic-22", "title": "מי זאת ברנדה מילנר ומה היא גילתה על הזיכרון של HM ?", "blocks": [{"type": "image-row", "images": ["/doc-assets/image-052.png"]}, {"type": "paragraph", "text": "היא ניסתה לצייר מול מראה מה קרה להנרי מולייסון הוא לא זכר שהוא עשה והוא בכל זאת השתפר, ולמדנו שאין לו זיכרון אבל יש לו זיכרון חושי וקראנו לו זיכרון פרוצדוראלי או זיכרון מאומץ, היא רצתה לדעת אם משהו נשאר, למשל הדרך לכניסה למוסד הוא למד ואיך זה יכול להיות אם אין לו זיכרון ואז היא החליטה לעשות את הניסוי והיא זאת שחילקה את הזיכרון."}, {"type": "paragraph", "text": "הניסוי שלה הוכיח שיש שני מערכות זיכרון נפרדות, זיכרון מודע וזיכרון לא מודע. לפני הנרי מולייסון חשבו שהזיכון הוא דבר אחד ואחיד. אחרי הניסוי עם הנרי מולייסון התברר שהזיכרון הוא משפחה של מערכות נפרדות במוח עם מיקומים שונים ומנגנונים שונים."}, {"type": "paragraph", "text": "סוגי זיכרון לטווח ארוך: דקלרטיבי (אפיזודי, סמנטי) , אימפליסטי (התנייה קלאסית, הביטואציה, סנסיטיזציה, priming )"}, {"type": "image-row", "images": ["/doc-assets/image-053.png"]}, {"type": "paragraph", "text": "זיכרון מפורש אני יכולה להגיד את זה במילים אבל זיכרון בגוף או ידים אני לא יכולה להגיד את זה במילים."}, {"type": "paragraph", "text": "זיכרון סמנטי ידע"}, {"type": "paragraph", "text": "זיכרון אפיזודי אירועים"}, {"type": "paragraph", "text": "זיכרון פרוצדוראלי – רכיבה על אופניים, שירה,"}, {"type": "paragraph", "text": "זיכרון פריימינג (הטרמה) – עוד כמה דקות אנחנו מסיימים לשחק למשל בגן יש כללים ולפני שהוא נכנס לגן הוא יודע שיש כללים אבל אם נשאל אותו הוא ידע לומר לכן לדעת אורית הפריימינג נמצא גם בזיכרון במילים וגם בגוף וידיים. דוגמה נוספת ריח של עוגה ומזכיר לי את אמא והבית."}, {"type": "paragraph", "text": "התניה קלאסית – ילד שנכנס למרפאה ומהריח מתחיל להקיא,"}, {"type": "paragraph", "text": "הביטואיציה – למשל אחרי נסיעה לחול שחוזרים לארץ שומעים רק צפצופים."}, {"type": "paragraph", "text": "זיכרון סנסיטיזציה – שמיעה של בכי של תינוק למרות שלא בטוח שיש בכי"}, {"type": "paragraph", "text": "למה דקלרטיבי יותר קל להסביר כי הוא במילים לכן יותר קל לנו."}, {"type": "paragraph", "text": "המון דברים כוללים את הזיכרון הפרוצדוראלי ובלמידה אנחנו משתמשים בכמה יחד."}, {"type": "paragraph", "text": "לנגן על כלי נגינה זה זיכרון סמנטי ופרוצדורלי יחד."}]}, {"id": "topic-23", "title": "מי זה אבינגהאוס, מה הוא גילה לגבי שכחה?", "blocks": [{"type": "image-row", "images": ["/doc-assets/image-054.png"]}, {"type": "paragraph", "text": "כל מה שנאמר על העניין של היצירה של סינפסות וחיזוק הסינפסות ידענו מהאיש הזה שהוא החליט ללמד את עצמו מילים אבל בגלל שהוא לא רצה להשפיע על המילים הוא כתב מחברת עם מילים והיה אומר לעצמו על הקצב של המנטרונום וניסה לזכור את רשימות המילים. ואז הרמן אבינגהאוס דיווח כמה זמן הוא זוכר וכדי לדווח על מה שהוא עשה איך הוא כותב כדי שיבינו הוא צריך לכתוב רקע מחקר ודיון הוא הראשון שהמציא את כתיבת המאמרים."}, {"type": "image-row", "images": ["/doc-assets/image-055.png"]}, {"type": "paragraph", "text": "מה שהוא מצא שאם הוא פשוט לומד פעם אחת ולא עושה כלום ולא חזר על זה עוד פעם הוא שוכח די מהר. אחרי יום הוא זוכר 20 מילים ואחרי 6 ימים הוא לא זוכר כלום ואז הוא אמר שהוא ינסה משהו אחר הוא יחכה יום וחזור על החומר שוב ואז הוא ניסה לבדוק כמה זמן לוקח לו לשכוח ואחרי 6 ימים הוא זכר קצת מהחומר."}, {"type": "image-row", "images": ["/doc-assets/image-056.png"]}]}, {"id": "topic-24", "title": "מערכות הניהול ותפקודים ניהוליים / אליוט מי זה, מה קרה לו?", "blocks": [{"type": "image-row", "images": ["/doc-assets/image-057.png"]}, {"type": "paragraph", "text": "אליוט עבר סוג של שבץ קטן עשו לו כל מיני מבדקים של התפקוד המוחי והוא עובר את המבדקים הללו בהצלחה הוא בריא לחלוטין. אבל מה קורה לאחר תקופה קצרה מהפגיעה? אליוט קיבל פיטורים מהעבודה הוא התגרש עזב את הבית התחתן שוב התגרש שוב ועבר לגור במרתף בית אחיו. מאדם מוצלח, עורך דין לאדם די מסכן וכך הוא מגיע לדמסיו שינסה לזהות מה קרה לו במוח לאחר השבץ."}, {"type": "paragraph", "text": "דמסיו עושה עליו סדרה של בדיקות תפקודיות על קשב ורגש ואמפטיה ובכל המבדקים אליוט עובר בצורה מדהימה אבל כשהוא מספר את סיפור חייו הוא מגלה שאליוט לא מתאר שום רגש ואז דמסיו מתחיל לראות איפה השבץ שלו היה, הפגיעה הייתה באזור בין הרגש לאונה הקדם מצחית. אנחנו יכולים לסכם את המחלה של אליוט לדעת אבל לא להרגיש. מה הכוונה האדם בעצם אין לו יותר שום רגש לגבי מה שמתרחש בחייו. דמסיו כותב לבסוף ההחלטות לאליוט יש מישור."}, {"type": "paragraph", "text": "בלי רגש אין לנו יכולת להרגיש. דקרט אמר שהכל זה חשיבה ולכן כל החלטה שאני מקבלת היא קוגניטיבית ואם אני הגיונית אני יכולה לקבל החלטות טובות. לכאורה אליוט אדם רציונלי וכתוצאה מהפגיעה שלו והא לא יכול להחליט שום דבר הוא לא הצליח לעבור את תהליך הבחירה."}, {"type": "image-row", "images": ["/doc-assets/image-058.png"]}, {"type": "paragraph", "text": "דמסיו תיאר שהוא רצה להיפגש עם אליוט במסעדה ולקח לו שעה שלמה של שיחה והוא לא הצליח להגיע להחלטה."}, {"type": "paragraph", "text": "כל הזמן היינו בחשיבה שדיברנו על קליפת המוח ובכלל לא חשבנו על הקשר לרגש למה שקורה שם. זה מה שקרה לדמסיו. אצל אליוט נהרס החיבור לבקרה וניהול ואצל גייג׳ נהרס רוב מערכת הניהול. בכל מיני מחלות נפש יש בעיות בחיבורים."}]}, {"id": "topic-25", "title": "פיניאס גייג׳ מי זה, מה קרה לו?", "blocks": [{"type": "image-row", "images": ["/doc-assets/image-059.png"]}, {"type": "paragraph", "text": "פיניאס גייג׳ המקרה המפורסם ביותר בהיסטוריה של מדעי המוח. הוא היה פועל מסילות רכבת באמירקה בשנות 1840, היה ידוע כאדם אחראי מקצועי ואהוב על כל. בשנת 1848 בוורמונט הוא עבד על פיצוץ סלעים, תפקידו היה לדחוס אבק שריפה לתוך חור בסלע עם מוט ברזל ארוך. משהו השתבש בדרך והפיצוץ יצא מוקדם. המוט עף לתוך לחיו השמאלית וחדר דרך גולגולתו, השמיד את האונה הפרה פרונטלית השמאלית ויצא מקודקוד ראשו. פיניאס נשאר בהכרה. לאחר המקרה מבחינה פיזית הוא החלים במפתיע דיבר, הלך ותפקד לחלוטין אך אישיותו השתנה לחלוטין. מאדם אחראי ומכובד הוא הפך להיות גס, חסר עכבות ולא אמין הוא לא יכל לקבל החלטות ולא סבל לקבל ביקורת."}, {"type": "paragraph", "text": "הסיפור של פיניאס גייג׳ הוא מאוד מפורסם. בעקבות התמונה החוקרים עשו שחזור כמו בתמונה למעלה ורואים איפה המוט עובר באונה הקדם מצחית. זו פעם ראשונה בהיסטוריה שהתחילו להבין שאזורים שוני במוח עושים דברים שונים ואם אזור אחד במוח נפגע הוא משפיע על תפקודים אחרים. יש בכל אזור במוח תפקוד."}, {"type": "paragraph", "text": "דוגמאות לתפקודים ניהוליים"}, {"type": "image-row", "images": ["/doc-assets/image-060.png"]}]}, {"id": "topic-26", "title": "תפקוד ניהולי חם וקר, איפה בערך יושב, מה ההבדל?", "blocks": [{"type": "image-row", "images": ["/doc-assets/image-061.png"]}, {"type": "paragraph", "text": "לאחרונה גילו במדעי המוח שיש להם תפקוד ניהולי חם אלו רצונות ותגובות מידיים שלי באזור האדום זה כאילו חם לי. וישנם תכנונים שלא קשורים אליי לשחק משחק שלא אכפת לי מהתוצאות שלו וזה ממש הבדל בינהן. אליוט נפגע בחיבור החם. זה מתחבר למערכת הלימבית ושם נמצא החיבור ושם זה קורה שאני מתחברת לרגש ובהמשך ובתקווה אדע לעשות את זה יותר קר ולהחליט מה אני עושה."}, {"type": "image-row", "images": ["/doc-assets/image-062.png"]}, {"type": "paragraph", "text": "אומרים לילדים שיש בובה לידם ושיצביעו על הצלחת שהם רוצים לתת לבובה. כדי שהם יקבלו את הצלחת עם יותר הממתקים הם יתנו לבובה את הצלחת עם היותר ממתקים. היה קשר חזק בין היכולת של הילדים להצביע על הצלחת הנכונה לבין הגיל היכולת המילולית ויכולת הבקרה. הם נוהגים באימפולסיביות. אבל החוקרים אמרו לילדים נשחק שוב אבל במקום ממתקים הם ישימו מטבעות אבל עבור כל מטבע הם יכולים לקבל ממתק כל מטבע זה ממתק. אבל עכשיו אני מבקשת מהם לעשות את אותו המשחק בדיוק אבל מה קרה הילדים כן הצליחו. הם העבירו מהאזור האדום לאזור הכחול."}, {"type": "paragraph", "text": "מה זה האזור הוורוד זה האזור החם ככל שאני יותר למטה במוח אני באזורים של הרגש וככל שאני עולה למעלה במוח אני יותר באזור הקר המחושב יותר."}]}, {"id": "topic-27", "title": "תכנון פעולה מוטורית: אזור מוטורי ראשוני, אזור מוטורי סופלמנטרי/ משני", "blocks": [{"type": "image-row", "images": ["/doc-assets/image-063.png"]}, {"type": "image-row", "images": ["/doc-assets/image-064.png"]}, {"type": "paragraph", "text": "האזור הכחול מבצע פעולות, האזור הצהוב והירוק מתכנני פעולה. הרגש מגיע מבפנים עובר דרך האזור הוורוד עובר רחוק יותר מהאזור הקר."}]}, {"id": "topic-28", "title": "ראסל בארקלי, מי הוא, מה המודל שלו אומר?", "blocks": [{"type": "paragraph", "text": "."}, {"type": "image-row", "images": ["/doc-assets/image-065.png"]}, {"type": "paragraph", "text": "אחד החוקרים החשובים ביותר בתחום היה לו אח תאום שהיה לו קשב וריכוז קשה שלא אובחנה. אח שלו נהרג בתאונת דרכים שהוא היה שיכור וברקלי טוען שזה קרה בגלל בעיית קשב וריכוז. הוא אומר שזה בעיות קשב וריכוז הם קורים באונה הקדם מצחית אבל היא מתחילה מהמוטוריקה מהיכולת רגע לעצור ואז לחשוב אם אני לא יכול לעצור את המוטוריקה שלי האונה הקדם מצחית שלי לא מקבלת הזדמנות לחשוב אבל אני חייבת לפתח את היכולת לעצור ולפתח את התנועות שלי. התיאוריה שלו היום מקבלת יותר תאוצה הוא טוען שבעיות קשב וריכוז זה בעיות של תפקוד ניהולי הבעיה בתפקוד ניהולי גורם לבעיות הקשב. בעוד אחרים אומרים הפוך."}, {"type": "paragraph", "text": "ברקלי אומר שיש קשר בין הדברים. תנועה והיכולת לעצור תנועה קשורים בצורה הדוקה ליכולת שלי להפעיל תפקוד ניהולי הוא מראה במחקרים גם אנשים מבוגרים שלא נוגע בשוקולד למרות שהוא רוצה לאכול הוא עושה את אותה פעולה שילדים עושים אבל הוא לא מבצע בפעול. במוח ובשרירים נרשם האדם עושה את התנועה אבל משהו עוצר אותו."}, {"type": "image-row", "images": ["/doc-assets/image-066.png"]}, {"type": "paragraph", "text": "כל הבעיות של התפקודים הניהוליים זה בעיה ביכולת הפנמה אדם שיש לו קשב וריכוז יש לו חוסר הפנמה של היכולת לעצור את עצמו. ילד שמטפס למעלה הוא חייב להיות קשוב לשיווי משקל שלו ולעצור את התנועות שלו אם הוא זז ברקלי אומר שזה מפתח אצל הילד את היכולת של העכבה וזה במילא מפתח את היכולת לעשות תפקוד ניהולי טוב ואם הילד לא מקבל מספיק הזדמנויות זה יכול לגרום לילד לבעיות בהמשך."}, {"type": "image-row", "images": ["/doc-assets/image-067.png"]}, {"type": "paragraph", "text": "לילד אין לו אינהיביציה קשבית או תגובתית, או שאין לו בכלל. ברקלי יגיד שזה די דומה ואין הבדל בינהם. יש הרבה קשר בין אינהיביציה קשבית והתנהגותית הם קשורים אחד לשני ."}, {"type": "paragraph", "text": "יש חוסר הפנמה לא מספיק שעצרתי אני צריכה לחשוב אם אין לי איפה לחשוב אני לא אצליח. יש שתי בעיות לעצור ולחשוב והפנמה."}, {"type": "image-row", "images": ["/doc-assets/image-068.png"]}, {"type": "paragraph", "text": "בכל המודלים של ברקלי הוא מראה את זה."}, {"type": "image-row", "images": ["/doc-assets/image-069.png"]}, {"type": "paragraph", "text": "ברקלי התברר לו שיש המון משחקים שיכולים להשפיע על התפקודים הניהוליים לפי ברקלי והוא צדק. אכן זה עוזר והיום מדברים על משחקים דיגיטליים האם זה עוזר שאני עושה משחק דיגיטלי והאם הוא עוזר לתפקוד הניהולי שלי."}, {"type": "paragraph", "text": "התוצאה של ברקלי שיש קשר בין עבודה מוטורית לבין עבודה ניהולית. הדבר השני שקרה שהמון אנשים החלו לפתח כל מיני שיטות של כלים חיצונים כי ברקלי אומר אין להם הפנמה להחזיק הכל בראש או שעושים לוח או טיימר וברקלי לא פיתח אף אחד מהכלים הללו והוא לא אומר שהם עוזרים. אין מחקרים שמראים שהכלים באמת עוזרים לכולם."}, {"type": "paragraph", "text": "חלקי המוח"}, {"type": "image-row", "images": ["/doc-assets/image-070.png"]}, {"type": "paragraph", "text": "כְּפִיס הַמּוֹחַ (Corpus callosum) - מחבר בין שתי ההמיספרות של המח הגדול - הימנית והשמאלית. הוא מאפשר להמיספרות לחלוק ביניהן מידע, כך שכל צד של המוח יכול לדעת מה השני תופס ועושה."}, {"type": "paragraph", "text": "חלק ניכר ממעבר המידע בין ההמיספרות מתבצע דרך כפיס המוח. על כן יש לו תפקיד משמעותי בתקשורת של מערכת העצבים."}, {"type": "image-row", "images": ["/doc-assets/image-071.png"]}, {"type": "paragraph", "text": "האונה המצחית )פרונטאלית) נמצאת בחלקו הקדמי של המוח. אחראית על תכנון והכוונת התנהגויות מורכבות, והוא זה שמעורב בקבלת החלטות מודעת. בחלקה האחורי של אונה זו ממוקמת הקליפה המוטורית, אשר אחראית על הוצאה לפועל של תנועות ושולחת פקודות לשרירים בכל רחבי הגוף."}, {"type": "image-row", "images": ["/doc-assets/image-072.png"]}, {"type": "paragraph", "text": "האונה העורפית (אוקסיפיטלית) אחראית על עיבוד קלט חזותי ממערכת הראייה. מרכז העיבוד החזותי העיקרי במוח האדם ממוקם בחלקה הפנימי של האונה העורפית. אזור זה מכונה V1 (Visual one), ובו מתבצע עיבוד בסיסי יחסית של הקלט הראייתי. בהמשך, המידע מועבר לאזורי הראייה המשניים בקליפת הראייה V2, V3 וכו' שבהם מתבצע עיבוד מתקדם יותר של הגירוי החזותי. כל אזור שכזה מתמחה במאפיינים מסוימים של הגירוי (ניגודיות צבעים, תפיסת תנועה, זיהוי עצמים וכו')"}, {"type": "image-row", "images": ["/doc-assets/image-073.png"]}, {"type": "paragraph", "text": "האונה הרקתית או הטֶמפּוֹרָלית (TA: Lobus temporalis) היא חלק מקליפת המוח, אשר נמצא מתחת למענית הצידית בכל אחת מההמיספרות של המוח הגדול."}, {"type": "paragraph", "text": "האונה הרקתית אחראית על תהליכי השמיעה והיא מקושרת ביניהן על ידי כפיס המוח."}, {"type": "paragraph", "text": "באונה הרקתית נמצאים ההיפוקמפוס והאמיגדלה, שהם חלק מהמערכת הלימבית, מערכת הרגש של המוח. האמיגדלה מעורבת בתגובות רגשיות מיידיות, וההיפוקמפוס מעבירה מידע לזיכרון לטווח הארוך."}, {"type": "image-row", "images": ["/doc-assets/image-074.png"]}, {"type": "paragraph", "text": "האונה הקודקודית או הפָּרִיאֶטָלית (Lobus parietalis) היא חלק של המוח הגדול וממוקמת מאחורי האונה המצחית ומעל האונה העורפית."}, {"type": "paragraph", "text": "אונה הקודקודית הימנית מקושרת לשמאלית באמצעות כפיס המוח."}, {"type": "paragraph", "text": "האונה הקודקודית משלבת מידע חושי ממקורות שונים. היא אחראית על תחושות של מגע, חום וכאב - ההומונקולוס החושי."}, {"type": "paragraph", "text": "היא מעורבת בתפיסה מרחבית, במיוחד קביעת חוש הניווט וההתמצאות במרחב. חלקים של האונה הקודקודית חשובים לעיבוד שפה."}, {"type": "image-row", "images": ["/doc-assets/image-075.png"]}, {"type": "paragraph", "text": "לגרעין האקומבנס יש תפקיד חיוני במערכת החיזוק (התגמול) במוח, אשר יוצרת תחושה של הנאה בתגובה לגירויים שנתפסים כחיוביים. בעת הפעלה של מערכת החיזוק, תאי העצב בטגמנטום הגחוני מפרישים דופמין לתוך גרעין האקומבנס. מערכת זו מסייעת ללמידה בכך שהיא מגדילה את ההסתברות לחזרה על ההתנהגות שבוצעה בעת הפעלתו של מסלול זה. מסלול התגמול במוח ממלא תפקיד פעיל גם בתהליכים של התמכרות לסמים."}, {"type": "image-row", "images": ["/doc-assets/image-076.png"]}, {"type": "paragraph", "text": "התלמוס (מיוונית חדר פנימי) קולט ומעבד את מרבית המידע התחושתי והתנועתי שמגיע אל קליפת המוח, כמו למשל העברת קלט הראייה אל קליפת הראייה באונה העורפית, לשם עיבוד ופענוח."}, {"type": "paragraph", "text": "התלמוס מעורב גם בתפקודים רגשיים. מידע אודות גירוי מסוים מעובד על ידי התלמוס ומועבר לאמיגדלה, שם הוא מעורר מוטיבציה ראשונית להיחשף לגירוי או להימנע ממנו. באמצעות האמיגדלה המידע שמספק התלמוס מגיע אל ההיפותלמוס, המעורב ביצירת תגובות פיזיולוגיות."}, {"type": "paragraph", "text": "התלמוס מעורב בתהליכי העוררות ובתחושת הדחף לישון."}, {"type": "paragraph", "text": "התלמוס זו תחנת הממסר של המוח – שנים לא חשבנו שהוא לא עושה כלום, שזו התחנה המרכזית של המוח והוא לא עושה כלום מעבר לזה לאחורנה גילינו שהוא שולח לכול האזורים ה ראשוניים"}, {"type": "image-row", "images": ["/doc-assets/image-077.png"]}, {"type": "paragraph", "text": "גרעין מאוד בסיסי במוח הוא עושה דרים מטורפים הוא קשור לקשב מודעות חשיבה ופלסטיות מוחית ויש לו תפקיד ענק."}, {"type": "paragraph", "text": "מתחת התלמוס יש עוד גרעין השולח ל-v1 . התלמוס מקבל מידע והוא שולח אותו למקומות."}, {"type": "image-row", "images": ["/doc-assets/image-078.png"]}, {"type": "paragraph", "text": "למוח הקטן יש תפקיד חשוב במסגרת המערכת המוטורית. תפקידו העיקרי של המוח הקטן הוא לווסת את תנועות הגוף, לשמור על שיווי משקלו ולשמירת טונוס השרירים. הוא משתתף בתכנון ותזמון של תנועות וביצירת תיאום בין השרירים הרצוניים, לצורך ביצוע של תנועות מיומנות ומורכבות. המוח הקטן יכול לתקן תנועות בזמן אמת ולהביא לביצוע חלק, תוך שימוש במידע אשר מגיע אליו מהפריפריה ומהמוח."}, {"type": "image-row", "images": ["/doc-assets/image-079.png"]}, {"type": "image-row", "images": ["/doc-assets/image-080.png"]}, {"type": "image-row", "images": ["/doc-assets/image-081.png"]}, {"type": "paragraph", "text": "הירוק למעלה זה חלק מהקורטקס. האדום הפנימי זה כפיס המוח."}, {"type": "image-row", "images": ["/doc-assets/image-082.png"]}, {"type": "paragraph", "text": "אזור הדיבור – ברוקה אזור השמיעה ורניקה. בדרך כלל כותבים בימין אז באזור שמאל במוח נמצא האותיות. האזור ממול אזור האותיות בצד ימין במוח הוא פרצופים."}, {"type": "image-row", "images": ["/doc-assets/image-083.png"]}, {"type": "paragraph", "text": "קדמי – anterior לכיון הפנים/ הראש"}, {"type": "paragraph", "text": "אחורי – posterior לכיון הזנב"}, {"type": "paragraph", "text": "לטרלי - רחוק מקו האמצע לכיוון הצדדים"}, {"type": "paragraph", "text": "מידאלי – קרוב לקו האמצע של הגוף"}, {"type": "paragraph", "text": "ונטרלי – בטני הצד התחתון (הבטן)"}, {"type": "paragraph", "text": "דורסל – הצב העליון הגב כמו שעוף דורס מגיע מלמעלה."}, {"type": "paragraph", "text": "חתכים:"}, {"type": "image-row", "images": ["/doc-assets/image-084.png"]}, {"type": "image-row", "images": ["/doc-assets/image-085.png"]}, {"type": "paragraph", "text": "החריץ הכחול בתמונה זהו הסולקוס המרכזי הוא מפריד בין שתי אונות: האונה המצחית (צהוב ירוק) לאונה הקודקודית (כתום). הסולקוס הלטרלי נראה כאשר מסתכלים מהצד של המוח, הוא מפריד בין האונה הרקתית לבין האונה הקדמית + קודקודית. הוא רץ לרוחב המוח – אופקית."}, {"type": "paragraph", "text": "גירוס אלו הגבעות הקטנות או הקפלים שמופיעים במוח."}, {"type": "paragraph", "text": "החריץ המרכזי במוח מפריד בין האונה המצחית לאונה הקודקודית. מהצד הקדמי של החריץ יש את הצד המוטורי ומהצד האחורי יש את האזור הסנסורי הם מודבקים אחד לשני כאילו קיפלתי אותו והם יכולים לדבר אחד עם השני. M1 זה קרוב יותר לאונה המצחית זה המוטורי מה החלק הקדמי של המוח הוא בעיקר מקבל החלטות לאחר שהחלטתי אני מתחילה לנוע יש החלטה וביצוע באותה אונה. תחשבו רגע בדרך כלל אנחנו חושבים על מוטוריקה כעל משחקים מוטוקרים, כל אחד עושה מאיתנו תנועה, כל הזמן. כל זה החלטות של האונה המצחית היא אומרת בואי נזוז והגוף זז מאוד קל לזכור שהאזור המוטורי הוא קדימה כי שם מקבלים את ההחלטות."}, {"type": "image-row", "images": ["/doc-assets/image-086.png"]}, {"type": "paragraph", "text": "יחד עם גייג׳ היה מקרה נוסף של אדם שידע להגיד רק את המילה טן. אחרי פגיעה מסוימת האדם לא הצליח להפיק שום מילה כל המילים נעתקו ולכן קראו לו מר טן ואף אחד לא הצליח להבין אותו או שהוא הצליח לכתוב מה הוא רוצה. לאחר הפגיעה מצאו במוחו של מר טן שאזור קטן שקרוב לאונה המצחית ובצד שמאל נפגע לאחר אירוע מוחי. ברוקה טען שזה אזור שפה שבהמשך קראו לו אזור ברוקה שאחראי על תכנון והפקת שפה. ברוקה הראשון שטעם שאזור השפה יושב בצד שמאל."}, {"type": "image-row", "images": ["/doc-assets/image-087.png"]}, {"type": "paragraph", "text": "רוב האנשים כותבים בימין ולכן אזורי השפה הם בצד שמאל מה זה אומר על כותבים ביד שמאל לאנשים שכותבים בצד שמאל לחלק מהאנשים שכותבים בצד שמאל אזור השפה שלהם בצד ימין וחלק יש להם אוזר שפה בשני הצדדים. יש עדות לסיכוי שיהיה בעיה בשפה אבל לא בהכרח. ורניקה כמה שנים אחר כך גילה מקרה דומה של אדם שלא הצליח להבין שפה הוא יכל לדבר אבל לא להבין את השפה ואין משמעות למילים. גם הוא עבר שבץ וכך הוא גילה אזור אחר במוח. אם יש פגיעה באזור של ברוקה אני לא יכול לדבר. אבל אם נפגע אזור ורינקה אני לא מבין את השפה."}, {"type": "paragraph", "text": "אזור ברוקה יושב באונה המצחית – בניהול , לדבר זה פעולה אני מזיזה את השפתים ואת הלשון."}, {"type": "paragraph", "text": "ורינקה ושב מאחורה באונה האחורית- בקליטה, זה הבנת השפה. גם תינוקות קטנים יכולים להבין בין מספרים וכמות. אם מקבלים שם פגיעה מוח נעלמת הפגיעה המוחית, יש אנשים שאין להם בעיה לראות קצת והרבה כדי שאני אבין מתמטיקה צריך שיהיה חיבורים במוח כדי להבין את המתמטיקה זה לא דווקא שיש פגיעה בהבנה במתמטיקה אלא בחיבורים במוח."}, {"type": "image-row", "images": ["/doc-assets/image-088.png"]}, {"type": "paragraph", "text": "רכס החגורה יש המון תשומת לב הניתנת להיפוקמפוס ואמיגדלה, היא בגודל של שקד, או ההיפוקמפוס הגדול במעט מהאמיגדלה אבל רכס החגורה הוא בלתי נפרד מקפיץ המוח ואז מה שמקובל לראות"}, {"type": "image-row", "images": ["/doc-assets/image-089.png"]}, {"type": "image-row", "images": ["/doc-assets/image-090.png"]}, {"type": "paragraph", "text": "הוא מהווה החלק העליון של המערכת הלימבית."}, {"type": "image-row", "images": ["/doc-assets/image-004.png"]}, {"type": "paragraph", "text": "הירוק הקטן – אמיגדלה היא מעבדת רגשות ומזהה מצבי סכנה. ההיפוקמפוס יושב במערכת הלימבית הרגשית והוא חיוני ללמידה. אם מוציאים אותו לא זוכרים כלום. הוא יושב מתחת לאמיגדלה. הם מאוד קרובים אחד לשני ומה זה אומר לנו? הרגש הוא המפתח ללמידה. חוויות רגשיות אני זוכרת אבל חוויות טראומטיות לרוב נשאר כזיכרון עמוק."}, {"type": "paragraph", "text": "האמיגדלה עובדת באופן מידי ולא רצוני . אם האמיגדלה רואה משהו שמלחיץ אותה או מפחיד אותה היא מגיבה מידית באופן הישרדותי. היא אומרת להיפוקמפוס תשמע אנחנו לומדים שצריך לברוח מהסיטואציה מסוימת או להתמודד איתה. האמיגדלה שסוגרת את ההיפוקמפוס ובמצב כזה אין אפשרות ללמוד."}, {"type": "paragraph", "text": "חומר אפור מכיל בעיקר את גופי התאים של הנוירונים, הדנטריטים והסינפסות. הוא נמצא בקורטקס, גרעיני הבסיס וחוט השדרה בפנים. הוא עושה בעיקר עיבוד – חשיבה תחושה תנועה ."}, {"type": "paragraph", "text": "חומר לבן – מכיל בעיקר אקסונים חוטים ארוכים שמחברים בין נוירונים הצבע הלבן מגיע מהמיאלין. הוא נמצא מתחת לקורטקס הפנים של המוח וחוט השדרה בחוץ סביב הפרפר האפור. הוא מעביר מידע בין אזורים שונים במוח"}, {"type": "paragraph", "text": "כשלומדים משהו חדש החומר הלבן משתנה, לא רק האפור. המיאלין מתעבה סביב האקסונים שמשתמשים בהם הרבה מה שמאיץ את העברה."}, {"type": "image-row", "images": ["/doc-assets/image-091.png"]}, {"type": "image-row", "images": ["/doc-assets/image-092.png"]}, {"type": "paragraph", "text": "הגוף של התא החומר האפור שמסביבו יש מילין זה החומר הלבן. אפשר להבין לפי הכיוון שהמילין עוטף את האקסון אפשר להבין לאן האקוסנים הולכים."}, {"type": "image-row", "images": ["/doc-assets/image-093.png"]}, {"type": "paragraph", "text": "מוטיבציה"}]}, {"id": "topic-29", "title": "שלוש התחנות ותפקידם (VTA, NA אונה מצחית)", "blocks": [{"type": "image-row", "images": ["/doc-assets/image-094.png"]}, {"type": "paragraph", "text": "זה אחד המסלולים הכי נחקרים במוח. באמצע זו מערכת הרגש, אני צריכה שיעבור משהו לאזור התכנון (הכחול) כדי שיתחיל משהו."}, {"type": "image-row", "images": ["/doc-assets/image-095.png"]}, {"type": "paragraph", "text": "זה לא שדופמין משתחרר כי הצלחתי במשהו אבל זה משהו מאוד רגעי הדופמין האמיתי משתחרר לפני שאני מתחילה את הפעולה על סמך זה שאני חושבת שהפעולה הולכת להיות מתגמל. זה יכול להיות שוקולד, כסף, הצלחה במשחק מחשב."}, {"type": "paragraph", "text": "יש המון מוליכים עצביים ומה שקורה שכל מוליך עצבי יש לו מסלולים שעובדים בעיקר עם מסלול אחד למשל מסלול של התנהגות מכוונת מטרה זה במסלול דופמין. מסלול דופמינרי."}, {"type": "image-row", "images": ["/doc-assets/image-096.png"]}, {"type": "paragraph", "text": "איך זה עובד? מערכת הרגש משחררת דופמין כאילו היא משלמת כסף כדי שכל המוח יכנס למצב שהוא ירצה לעשות את זה. דופמין הוא מוליך עצבי החומרים שמאפשרים לנוירונים לתקשר. יש מאות סוגים של מוליכים עצביים ודופמין הוא אחד מהן. כל נוירון יש לו מוליך עצבי פעם אמרו שכל נוירון עובד עם מוליך עצבי אחד, היום יודעים שהסיפור לא פשוט ויש נוירונים שיודעים לעשות שניים אבל זה לא המודל הקלאסי."}, {"type": "image-row", "images": ["/doc-assets/image-097.png"]}, {"type": "paragraph", "text": "נוטים לחשוב על מוטיבציה כמשהו רגעי, זה מתחיל מרצון ראשוני אם בא לי ישתחרר רצון ראשוני. הבא לי נקרא VTA הוא נמצא בגזע המוח על ראש גזע המוח. זה הבסיס למערכת הלימבית ושם מתחיל להשתחרר הדופמין משם זה עובד עם החצים השחורים זה עובר לאזור סטיראטום הוא בודק בעצם האם הדבר הזה כדאי לי והאם הוא מצליח. אם לא מצליח לי אני אומרת שלא כל כך כדאי לי השאלות בעצם קשורות אחת לשנייה. בחלק הזה יש לי את המסוגלות ישנם ניסויים שנראה את הסטיריאטום נדלק ונכבה. הוא עוצר ולא מעביר את הדופמין הלאה. בסופו שלדבר אני צריכה להגיע לאיך עושים את זה שפה אני מתחילה לתכנן. כל המסלול הזה הוא דו כיווני. אנחנו יכולים להבין למה ילדים מסוימים מפתחים אהבה לתחום מסוים. בספרות רואים שני סוגים של תגובה לא מצליח לי ההורים שלי צודקים אני אפסיק עם הדבר הזה, ויש תגובה הפכוה של אנשים שאומרים אמרו לי שלא ילך לי אני אראה דווקא. המוח אוהב רמה מסוימת של לחץ ואתגר יש אנשים שזקוקים לזה יותר ויש אנשים שזקוקים לזה פחות."}, {"type": "image-row", "images": ["/doc-assets/image-098.png"]}, {"type": "image-row", "images": ["/doc-assets/image-099.png"]}, {"type": "paragraph", "text": "שני האזורים הכחולים מייצרים דופמין. אותנו מעניין VTA האזור השני מדבר עם האזורים המוטורים הוא קשור למחלות מוטוריות למשל פרקינסון."}, {"type": "paragraph", "text": "VTA בעברית קוראים לו הטגמנטום הגחוני. זה מה שמדרבן את כל המערכת לפעול. אבל מה גורם לדופמין להתשחרר?"}, {"type": "paragraph", "text": "הצד האפל של הדופצין"}, {"type": "image-row", "images": ["/doc-assets/image-100.png"]}, {"type": "paragraph", "text": "חוקרים גירוי עכברים ללחוץ על הדוושה מקבלים זץ ומשתחרר דופמין. מה קרה לעכברים? הם המשיכו ללחוץ על הדוושה ללא הפסקה. העכבר היה מוכן ללכת למקום מחושמל שזה כואב לו רק כדי לקבל את הדופמין. ממש כמו סמים, היום יודעים שכל הסמים שאפשר להתמכר אליהן עובדים על דופמין. הם לפעמים משחררים דופמין ולפעמים הם עוצרים מה שגורם לאנשים להתמכרות להמשיך ולצרוך מהדופמין. העולם למד להפעיל את מערכת הדופמין. פרסומות, חנויות, הטלפון ולאט לאט מתחילים להתמכר לגירוי הקטן הזה."}, {"type": "image-row", "images": ["/doc-assets/image-101.png"]}, {"type": "paragraph", "text": "אפשר לעשות עם דופמין דברים איומים ואפשר לעשות איתו דברים נפלאים."}, {"type": "image-row", "images": ["/doc-assets/image-102.png"]}, {"type": "image-row", "images": ["/doc-assets/image-103.png"]}, {"type": "paragraph", "text": "נוקלאוס (גרעין) אקומבנס נמצא עמוק במוח באזור הסטריאטום הגחוני, הוא חלק ממערכת הלימבית. הוא מרכז התגמול והעונג של המוח, כשקורה משהו טוב הוא מציף את המוח בדופמין ויוצר תחושת וואוו. הוא כמו לחצן הפרס של המוח בכל פעם שהוא מופעל המוח אומר עוד פעם!"}]}, {"id": "topic-30", "title": "מתי דופמין משתחרר? (עקומת u ההפוכה)", "blocks": [{"type": "image-row", "images": ["/doc-assets/image-104.png"]}, {"type": "image-row", "images": ["/doc-assets/image-105.png"]}]}, {"id": "topic-31", "title": "הנוירון, סינפסה ופוטנציאל הפעולה", "blocks": [{"type": "paragraph", "text": "סנטיאגו רמון אי קחאל ומה גילה, גולג׳י ומה גילה"}, {"type": "image-row", "images": ["/doc-assets/image-106.png"]}, {"type": "paragraph", "text": "ויכוח ענק בין שני חוקרים האם המוח מורכב מרקמה רציפה או יחידות בודדות המתקשרות בינהם? האם יש חוט אחד שמחבר את הכל או מתאים"}, {"type": "paragraph", "text": "סנטיאגו רמון אי קחאל הוא רצה להיות צייר אבא שלו היה רופא כירורג והוא רצה כמו כל אבא שהוא יהיה רופא אבל סנטיאגו רמון רצה להיות צייר. הוא היה ילד עקשן וחכם שבגיל שבע שמונה הוא החליט לבנות לעצמו תותח קטן ויורה על הגדר של השכן הורס לו כליל את כל הגדר ומה עשו? אבא שלו דיבר עם השוטר שיכניס אותו לכלא לילה אחד ואולי זה יסדר אותו. סנטיאגו נכנס לכלא לילה והאבא קיווה שהוא יהפוך להיות רופא וסנטיאגו התעקש בשלו ואז אבא שלו לקח אותו לבית קברות לא כדי להזכיר לו שהוא ימות יום אחד כדי לחפור שם ולהוציא גופות. ולמה לעשו זאת? כי פעם אם היית חוקר רפואה והיית רוצה לחקור את גוף האדם לא היה דרך לגלות כלום על גוף האדם אלא אם היית הולך לבית קברות ומוציא גופה ומנתח אותה וזה היה מקובל במאה ה19. סנטיאגו החליט בעקבות זה להפוך להיות חוקר דגול. סנטיאגו הפך להיות האדם הראשון בהיסטוריה של האנושות שראה וצייר תאי עצב נוירונים. בסופו של דבר הוא הצליח לחבר את אהבות שלו שהוא צייר נוירונים."}, {"type": "paragraph", "text": "סנטיאגו עשה זאת באמצעות שיטה שפיתח קמילו גולג׳י בשנת 1873 שאם משרים רקמת מוח בכסף נייטרט קומץ קטן של נוירונים נצבע בצבע שחור מוחלט על רקע צהוב שקוף. הנוירונים שנצבעו במלואם לחלוטין, גוף התא כל הדנטריטים האקסון עד הקצה. גולג׳י חשב שבמוח הכל זה חוט אחד מחובר והיה בינהם ממש מלחמה."}, {"type": "paragraph", "text": "ידוע שאם לוקחים רקמה שלמוח ועושים צביעה בעזרת השיטה שגולג׳י פיתח אפשר לראות נירונים בצורה יפה."}, {"type": "image-row", "images": ["/doc-assets/image-107.png"]}, {"type": "paragraph", "text": "הנירון הבודד בצד שמאל הוא לא באמת בודד יש עוד המון נירונים מסביב עד היום לא יודעים למה חלק מהתאים נצבעים לפי השיטה של גולג׳י וחלק לוקח להם זמן להגיב."}, {"type": "image-row", "images": ["/doc-assets/image-108.png"]}, {"type": "paragraph", "text": "הרעיון שבעצם המוח ומערכת העצבים זה תאים בודדים כמו כל הגוף, בד בעור בשומן וגם במוח יש תאים בודדים. לתאים הללו בעברית קוראים תאי עצב באנגלית נוירונים."}, {"type": "paragraph", "text": "מבנה הנוירון (גוף התא, דנדריט, אקסון, מיאלין, אקסון, טרמינל)"}, {"type": "image-row", "images": ["/doc-assets/image-109.png"]}, {"type": "paragraph", "text": "הירוק זה גוף התא – כמו התאים ובתוך התא יש את גרעין התא. הוא לא באמת עגול ויפה יש לו דנטריטים הם מתחברים לגוף התא, תמיד לגוף תא יש שילוב של זרוע שהוא יותר גדול וחזק זה ההאקסום ובסופו יש שוב זרועות שהם טרמינלים. הדנטריטים מקבלים מידע והאקסון שולח מידע. מהדנטריד לגוף התא דקרך האקסון לטרמינל."}, {"type": "image-row", "images": ["/doc-assets/image-110.png"]}, {"type": "paragraph", "text": "בערך אלפית עובי השערה ואז מקבלים דנדריט."}, {"type": "image-row", "images": ["/doc-assets/image-111.png"]}, {"type": "paragraph", "text": "רואים את הנוירון יש כמו חתיכות ג׳לי שהוא חומר שומני שנקרא מיאלין הוא מבודד את האקסון כדי שהאות החשמלי יוכל לנוע בצורה קלה בתוך האקסון ולא לצאת החוצה ולהיעלם זה חומר מבודד. החומר המבודד הזה הוא מאוד חשוב והתחילו להבין זאת שהתחילו לחקור מחלות כמו טרשת נפוצה כי בטרשת נפוצה המיאלין נעלם ואז הנוירון לא מצליח לשלוח שום דבר.. בהמשך קרו דברים מעניינים יותר."}, {"type": "paragraph", "text": "תאי גליה ומה תפקידם (תזונה, תמיכה, פלסטיות מוחית, שליטה על מיהרות העברת פוטנציאל הפעולה)"}, {"type": "image-row", "images": ["/doc-assets/image-112.png"]}, {"type": "paragraph", "text": "התאים הללו לא עשים כלום וכל מטרתם לתמוך באקסון כי אז הוא לא יהיה חזק. שנים זו הייתה החשיבה."}, {"type": "image-row", "images": ["/doc-assets/image-113.png"]}, {"type": "paragraph", "text": "היום טוענים שאולי תאי גליה עושים משהו ופרופ ענבל גושן גילתה דברים מטורפים."}, {"type": "image-row", "images": ["/doc-assets/image-114.png"]}, {"type": "paragraph", "text": "תאי גלייה זה הכחול בתמונה גרעין התא והתא נמצאים בעיגול הצהוב כתום מצד שמאל."}, {"type": "paragraph", "text": "הוא שולח כמו חומר שומני ומלפף אותו סביב האקסון ככל שהוא מלפף יותר חזק האות באקסון נוסע יותר מהר וכלל שהוא מלפף פחות החשמל עובר לאט יותר. הם קושרים לתזמון המוחי במוח. יש להם תפקיד מכריע בלמידה כדי לעשות דברים אני צריכה שהמערכת תהיה מתוזמנת אחת עם השנייה."}, {"type": "paragraph", "text": "בשנים האחרונות גילו שתאי הגליה מאוד חשובים. ככל שאני אתרגל חזק יותר והרבבה יותר אני אלפף יותר את האקסון והמיאלין גודל. זה הולך מיאלין קטע חשוף מיאלין קטע חשוף . בסוף השנה נדבר מה הולך בתוך האקסון. המרווחים הללו נקראים מרווחי רנויאר על שם החוקר שגילה אותו."}]}, {"id": "topic-32", "title": "מה עושים תאי עצב לדוגמה ב V1 A1 ומי הם hubel and wiesel ?", "blocks": [{"type": "paragraph", "text": "תאי העצב מייצרים רשתות העומדות בבסיס היכולות השוות של המוח."}, {"type": "image-row", "images": ["/doc-assets/image-115.png"]}, {"type": "image-row", "images": ["/doc-assets/image-116.png"]}, {"type": "paragraph", "text": "הולכים לאונה האוקסיפיטלית העורפית ננסה להבין מה קורה בחוש הראיה. אפשר להחדיר אלקטרודה לגוף התא ואפשר לראות מתי התא מגיב ונותן פולס חשמלי מתי הוא נותן פולס חשמלי ומתי לא."}, {"type": "paragraph", "text": "הובן וויזל מנסים להראות לחתול כל מיני חפצים שונים אחרי שהם החדירו את האלקטרודה ולא יוצא שום אות חשמלי. אם הובן וויזל היו עושים את המחקר שלהם היום על מחשב הם לא היו מגיעים לנתונים שלהם היום ולא היו מקבלים פרס נובל."}, {"type": "paragraph", "text": "הם ישבו עם כל מיני ציורים על השקפים והם חשבו שהוא מגיב לכדור אבל התא הגיב לזה שאם הוא מוריד את השקף נוצר קו על המסך ואז החתול הגיב לתזוזה של הקו השוליים של השקף שהם שמו על המטול."}, {"type": "paragraph", "text": "בזכות התגלית שלהם הצליחו להבין את כל מערכת העצבים אחר כך."}, {"type": "image-row", "images": ["/doc-assets/image-117.png"]}, {"type": "paragraph", "text": "בתמונה כל קובייה מייצגת תא. הם גילו שכל התאים בעמודה מסוימת מגיבים לקו ישר יש עמודה אחרת שמגיבים לקו יותר נטוי וכו. איך הוא מגיב לעיגול אם תא אחד מגיב לקווים שונים תא הבא שהוא לא באזור הראיה הראשוני הוא מבין שיש פה קוים אופקיים ורוחביים ואולי זה בית או משהו אחר."}, {"type": "paragraph", "text": "מה שגילו שהתאים הללו אוהבים קוים אבל הם אוהבים יותר קווים שזזים היום שעושים ניסוים בv 1 מזיזים דברים על המסך. עשו ניסוי אמיתי שחיה יושבת מול מסך ושמו לו אלקטרודה בתוך התא וחיברו למכשיר שאם התא מגיב הוא ישמיע צליל."}, {"type": "paragraph", "text": "אזור השמיכתי הראשוני A1 נמצא באונה הרקתית תאי העצב כאן מגיבים לתכונות בסיסיות של צליל."}, {"type": "paragraph", "text": "מה שמשותף לשניהם שהם פועלים באותו עיקרון עיבוד היררכי מהפשוט למורכב."}]}, {"id": "topic-33", "title": "מה זה מוליך עצבי - הגדרה (לעומת הורמון)", "blocks": [{"type": "image-row", "images": ["/doc-assets/image-118.png"]}, {"type": "image-row", "images": ["/doc-assets/image-119.png"]}, {"type": "paragraph", "text": "אם זה חומר שלא עובר בסינפסה הוא לא חומר חשמלי. אוקסיטוצין עושה תהליכים גם במוח וגם הורמון. וישנם עוד חומרים נוספים שמשמשים בשני התפקידים."}, {"type": "paragraph", "text": "דופמין, סרוטונין, אוקסיטוצין, אדרנלין, GABA , גלוטמט – תפקידם בגדול"}, {"type": "image-row", "images": ["/doc-assets/image-120.png"]}, {"type": "paragraph", "text": "כמה מוליכים עצבים יש במוח? יש המון וכל המזמן מגלים חדשים."}, {"type": "image-row", "images": ["/doc-assets/image-121.png"]}, {"type": "paragraph", "text": "למה יש ליד הגבא חץ למטה ובגלוטמט יש חץ למעלה? גלוטומט מעלה פעילות זה לא אומר אם יש לי גלוטומט זה אומר שיש לי מצב רוח טוב יותר זה אומר שהנוירונים הללו פועלים יותר הם מעלים פעילות עוררות וגבא מורידה פעילות חשמלית."}, {"type": "paragraph", "text": "שלבי הפעולה של הסינפסה + הקשר לתרופות"}, {"type": "image-row", "images": ["/doc-assets/image-122.png"]}, {"type": "paragraph", "text": "הוא הולך לתת מידע לדנדריט הבא הוא צריך לעבור את הסינפסה התא האדום הוא פרה סינפטי והצהוב הוא פוסט סינפטי. יכול להיות שהוא ממשיך והוא יכול להיות גם פרה סינפטי."}, {"type": "paragraph", "text": "התהליך מאוד פשוט יש אות חשמלי שמגיע והוא פוגש את סוף האקסון טרמינל האות החשמלי מתפוצץ את השלפוחיות עם המוליך העצבי."}, {"type": "image-row", "images": ["/doc-assets/image-123.png"]}, {"type": "paragraph", "text": "ככל שיש יותר כאב או רעש יש יותר מוליך עצבי יש הרבה יותר פולסים כל פולס מפוצץ מוליך עצבי עוצמת החשמל תמיד קבועה, מה שזה אומר התדירות של הפולסים גורם לשחרור במוליך העצבי."}, {"type": "image-row", "images": ["/doc-assets/image-124.png"]}, {"type": "paragraph", "text": "האות החשמל באר מפוצץ את השלפוחיות האות החשמלי נקלט בסינפסה ואז נוצר אות חשמלי חדש. מה קורה למוליך העצבי אחרי שהוא משתחרר? רוב המוליך העצבי עובר ריאפטייק הוא נשאב בחזרה הוא שואב את החומר בחזרה המוח חסכוני."}, {"type": "image-row", "images": ["/doc-assets/image-125.png"]}, {"type": "paragraph", "text": "רטלין – זו דוגמה יפה לתהליך סופר מעניין שכל התרופות עובדות כך הרטלין עובד על הריאפטיק . הנוירון של הקשב ישן במקום שהוא יהיה בקשב הוא ישן כי אין לו מספיק דופמין אני צריכה לייצר יותר דופמין במערכת הזו אני עוצרת את הריאפטייק הדופמין נשאר בסינפסה וממשיך להפעיל את הנוירון הבא ואז נוירוני הקשב מתעוררים כי יש עוד ועוד דופמין. כל התרופות עובדות כך או שהן עוצרות את הריאפטייק יהיה יותר דופמין ויהיה לי יותר מוליך עצבי. כל התרופות עובדות על המוח או שהן עובדות על המוליך העצבי או מורידות אותו חוסמות את הריאפטייק וכו׳ זה הסיפור הגדול של הסינפסות."}, {"type": "paragraph", "text": "אוקסיטוצין למשל הוא עושה גם דברים גופניים ועובר דרך מערכת הדם . וגם חומרים ביוכימים העובר בתוך הסינפסות כמו שאמא מחזיקה את התינוק שלה בפעם הראשונה."}, {"type": "paragraph", "text": "תרופות נירואקטיביות כמו סמים משככי כאבים רטלין ותרופות פסיכיאטריות הן עובדות על הסינפסה הם יכולים להגביר שחרור של מוליך עצבי הם יכולים לחסום את הקליטה של המוליך העצבי עם קולטן כי הוא מלא במשהו אחר או שאני יכולה לעצור את הריאפטייק החומר יישאר ברווח הסינפטי ולכל אחד מהם יש השפעה אחרת על הנוירון הפוסט סינפטי."}, {"type": "image-row", "images": ["/doc-assets/image-126.png"]}, {"type": "paragraph", "text": "הרטלין מגבירה פעילות נוירונלית היא מעלה. היא חוסמת את הריאפטיק המוליך הסינפטי נשאר בסינפסה. הוא נשאר שם ולכן הוא נקלט שוב לכן הפוסט סינפטי יכולים לקלוט את זה שוב. בבעיית קשב התברר שהדופמין ומידע חוזר ולכן אין מספיק פעילות בפוסט סינפטי ולכן בעזרת הרטלין אני חוסמת את החזרה של החומר וגורמת לו להישאר במרווח הסינפטי."}, {"type": "image-row", "images": ["/doc-assets/image-127.png"]}]}, {"id": "topic-34", "title": "מי זה קנדל, מה גילה ומה זה אפלזיה?", "blocks": [{"type": "image-row", "images": ["/doc-assets/image-128.png"]}, {"type": "paragraph", "text": "הוא עדין חי אריק קנדל. זכה בפרס נובל על החיה הזו. קנדל בשביל חוקרי מוח הוא כתב את התנך של מדעי המוח. זה ספר המסביר את כל הנירוביולוגיה. קנדל אמר שהוא חושב שהאפליזיה הזו יכולה ללמוד משהו ואם נבדוק את הניורונים שלה אחרי למידה אולי אראה מה גרם ללמידה שלה מבחינה נוירונית?"}, {"type": "image-row", "images": ["/doc-assets/image-129.png"]}, {"type": "paragraph", "text": "הנוירונים שלה גדולים שהם עד בקוטר של מילימטר זה ענק. ואם שמים תחת מיקרוסקופ אפשר לראות אותם בקלות. האפליזיה היא אחת מהחיות הפרימיטיביות שיודעת ללמוד ולכן הוא קרא לה חיה אינטליגנטית."}, {"type": "image-row", "images": ["/doc-assets/image-130.png"]}, {"type": "image-row", "images": ["/doc-assets/image-131.png"]}, {"type": "paragraph", "text": "האפליזיה למדה משהו והיא זוכרת אותו כמה ימים ואין חיה פשוטה שיכולה לזכור אותו כמה ימים קדימה. ג׳וק למשל לא זוכר."}, {"type": "image-row", "images": ["/doc-assets/image-132.png"]}, {"type": "paragraph", "text": "אם זיכרון נשמר לאורך זמן קורים דברים בסינפסה."}, {"type": "image-row", "images": ["/doc-assets/image-133.png"]}, {"type": "paragraph", "text": "הגברה סינפטית ארוכת טווח (יותר מוליל עצבי, סינפוטוגסיס, מיאלינזציה) הביטואציה, סנסיטיזציה ברמת הסינפסה +דוגמאות"}, {"type": "image-row", "images": ["/doc-assets/image-024.png"]}, {"type": "paragraph", "text": "ltp בעברית קוראים לזה הגברה סינפטית ארוכת טווח. חיזוק הסינפסה ארוכת טווח הסינפסה שינתה את החוזק שלה לאורך זמן."}, {"type": "paragraph", "text": "השאלה היא אם יש רק ltp או שיש גם את הכיוון ההפוך? נגיד שאני בלמידה אנטי הבינאית אני רוצה להכחיד זה נקרא ltd"}, {"type": "paragraph", "text": "זה משהו שקורה בלמידה די מהר, אם חוזרים הביתה וחוזרים על החומר יכול להיות שאחזור על החומר אני אולי אדע את כל החומר. אם אני עושה עוד כזה הוא עושה עוד שינוי בסינפסה הוא משנה את הכמות של הסינפסות."}, {"type": "image-row", "images": ["/doc-assets/image-025.png"]}, {"type": "paragraph", "text": "אדום זה הפרא סינפטי הוא שולח, הסגול זה הפוסט סינפטי מקבל. מי שנותן את האות זה תמיד הפרא סינפטי."}, {"type": "paragraph", "text": "סנסיטיזציה – הנוירון האדום מגדיל את. הענפים ויוצר סינפסות חדשות החיבור יצירת הסינפסות מתחזק ומתרחב זה בדיוק חדשות. מה קרה? גירוי חזק או מאיים כרם למוח להגביר את ה רגישות. לדוגמה נגעת בתנור חם ונכווית לאחר מכן אפילו קרבה קטנה לתנור המוח מגיב בחוזקה הרבה יותר מאשר לפני. הסינפסות הרלוונטיות התרחבו ומגיבות מהר יותר."}, {"type": "paragraph", "text": "היבטואיציה – התרגלות הנוירון האדום מאבד ענפים וסינפסות החיבור בעצם נחלש. מה קרה? הגירוי חוזר ושגרתי גרם למוח להחליט זה לא חשוב אפשר להתעלם. משהו שאפשר להתרגל אליו. לדוגמה הריח של הבית כשחזרת מחופשה ארוכה ונכנסת לבית הפעם הראשונה. הרחת בחוזקה ולאחר כעשר דקות בערך נעלם לחלוטין המוח למד שזה גירוי קבוע ולא מעניין הוא הפחית את הסינפסות שמעבירות אותו."}, {"type": "paragraph", "text": "בהמשך הבינו שכל הלמידה במוח מתרחשת כך יצירת הסינפסות זו אחת הדרכים שאני לומדת."}, {"type": "paragraph", "text": "בגרעין התא אני מייצרת קולטנים ומשנע אותם על. גבי הדנדריט ויש עוד כמה קולטנים, אם אני צריך לבנות חומר אפשר לעשות את זה מידי? לא זה לוקח זמן וזו הסיבה שלמידה ארוכת טווח לוקחת זמן. התא שלי צריך להכין את החומרים הללו הוא צריך זמן ליצור עוד סינפסה שלמה זה המון עבודה."}, {"type": "paragraph", "text": "בגרעין התא מיוצרים החומרים שאני צריכה כדי לבנות את החומרים הללו."}, {"type": "image-row", "images": ["/doc-assets/image-027.png"]}, {"type": "paragraph", "text": "ככל שהזמן עובר מגלים יותר על תאי הגליה שהן שולחים את הלשונות שלהם על האקסון והם משנים את המהירות של האות עובי המיאלין."}, {"type": "image-row", "images": ["/doc-assets/image-134.png"]}, {"type": "paragraph", "text": "מורה מנוסה שנמצא בכיתה לפעמים שמדברים על הכיתה שמים לב לילדים ספציפיים ומורה מתחיל הוא לא ישים לב לדברים אחרים. אין לו מספיק מיאלין זה תהליך שלוקח שבועות חודשים ואפילו שנים."}, {"type": "paragraph", "text": "אנשים יותר אינטליגנטים יש להם תאי גלייה יותר טובים, איך יודעים זאת? אם לוקחים עכבר ומזריקים לו חומר של תאי גליה של בני אדם הוא נהיה חכם יותר."}, {"type": "paragraph", "text": "שלושה דרכים בהם הלמידה מחזקת הדרכים בהם הנוירונים מתחזקים – חיזוק סינפטי , כמות הסינפסות גדלה , יותר מיאלין על האקסון."}, {"type": "image-row", "images": ["/doc-assets/image-135.png"]}]}, {"id": "topic-35", "title": "מה זה נוירומודולציה?", "blocks": [{"type": "image-row", "images": ["/doc-assets/image-136.png"]}, {"type": "paragraph", "text": "נוירומודולציה כמו שידור רדיו נוירון אחד משחרר חומר שמשפיע על אלפי נוירונים בו זמנית באזור שלם ומשנה את האופן שבו הם עובדים. היא לא מפעילה או מכבה נוירונים ישירות היא משנה את הרגישות שלהם לגירויים אחרים. כמו לכוונן את הווליום של הרדיו – לא משנה את התוכנית משנה עד כמה חזק אתה שומע."}]}, {"id": "topic-36", "title": "איך פועל אינהיביציה ואקסיטציה של נוירון? (EPSP, IPSP סכום במרחב וסכום בזמן)", "blocks": [{"type": "image-row", "images": ["/doc-assets/image-137.png"]}, {"type": "paragraph", "text": "יש שני סוגים שונים של נוירונים במוח אנשים עם הקשב האנהיבטורי לא עובד אצלם כי זה של הקשב אנשים עם בעיית קשב אין להם אינהיביציה והכל נראה להם חשוב. הרטלין עובד דווקא על המערכת האינהיביטורי היא מגבירה שם את היכולת להגיד למוח של עצמי להיות בשקט."}, {"type": "image-row", "images": ["/doc-assets/image-138.png"]}, {"type": "paragraph", "text": "אינהיביציה עובדת דרך חיבור סינפטי אני הולך לתפוס נוירון אקסיטטורי ולעצור אותו ואני רוצה שליטה מלאה עליו שאם אני אומרת לו לעצור הוא יעצור מיד באופן מוחלט."}, {"type": "image-row", "images": ["/doc-assets/image-139.png"]}, {"type": "paragraph", "text": "בהתחלה חשבנו שכל הנוירונים עושים את אי ובציור בי הוא מתחבר לגוף התא עצמו. אם אני תא אינהיביטורי אני רוצה זכות וטו על משהו שתא אחר רוצה לעשות איפה הכי כדאי לי להתחבר איך שהוא יעצור הכי טוב. או בהילוק איפה שההחלטה מתקבלת או אני יוצרת את זה באקסון הוא מנסה לשלוח סיגנל ואמרים לו לא אתה לא יכול לשלוח רוב האינהיבטורי במוח יושבים על האקסונים יושב עם הזכות וטו לאחר שכולם מדברים. החיבור הכי טוב שאני אוכל לעצור זה מהתא הפרא סינפטי לאקסון."}, {"type": "paragraph", "text": "נוירון פרא סינפטי תמיד ירוק ופוסט סינפטי זה בכחול. מה קורה בציור בי הוא מתחבר לגוף התא, הוא מתחבר לסומה על גוף התא עצמו. בציור סי הוא עושה סינפסה על האקסון הילוק."}, {"type": "paragraph", "text": "להסביר מה זה פוטנציאל מנוחה ומה השלבים של פוטנציאל פעולה לפי הגרף"}, {"type": "image-row", "images": ["/doc-assets/image-140.png"]}, {"type": "paragraph", "text": "אנחנו רוצים להבין מה קורה בין נוירונים אנחנו צריכים להבין את התקשורת בתוך הנויריו וביום הנוירונים. בין הנוירונים הבנו בערך סינפסה מוליך עצבי שמשתחרר ונקלט בנוירון הבא יש ריאפטייק ולא נאמר לנו מה קורה בנוירון שגורם לו לשחרר את הנוירטורנזמיטור ואיך הוא גורם לאות חשמלי בתוך האקסון."}, {"type": "paragraph", "text": "איך בעצם החשמל הזה זז בתוך האקסון."}, {"type": "paragraph", "text": "החשמל נע בתוך האקסון זה יפה המידע שעובר בתוך התא העצב הוא חשמלי אבל למוח יש בעיה גדולה ומה הבעיה שאם אני לוקחת כבל מאוד ארוך חשמלי חוט חשמלי ומעבירה בו חשמל אבל הכבל הוא מאוד ארוך חשמל בסופו של דבר מתחיל לדעוך הוא יורד כי זה מרחק מאוד ארוך שהוא צריך לעבור."}, {"type": "paragraph", "text": "במוח זה מתח נמוך שהם צריכים לעבור מרחקים ענקיים. אני צריכה להגיע מהראש לרגל כדי להזיז אותו. הבעיה של המוח שהחשמל שהוא מעביר ויחסית החוט מאוד ארוך והוא לא יגיע לסוף האקסון."}, {"type": "paragraph", "text": "המוח רוצה להעביר חשמל דרך האקסון אבל אם אני מעביר רגיל זה ידעך הוא חייב לחדש את הפולס החשמלי בתוך האקסון. במקום שהחשמל יזרום רק מגוף התא עד לסוף האקסון אני מחדש את החשמל זה כאילו שאני שמה בטרייה זעירה חדשה בכל מרווח רנוויאר."}, {"type": "image-row", "images": ["/doc-assets/image-141.png"]}, {"type": "paragraph", "text": "זה בעצם פוטנציאל הפעולה אנחנו הולכים ללמוד איך בעצם המוח מחדש את הפולס החשמלי."}, {"type": "paragraph", "text": "עוד צריך להבין שהנוירונים שלנו תאי העצב. הם לא בחלל ריק הם נמצאים בנוזל זה סוג של מרק של יונים."}, {"type": "image-row", "images": ["/doc-assets/image-142.png"]}, {"type": "paragraph", "text": "יון הוא אטום זהו החלקיק הקטן שנעסוק בו. יש לאשלגן ולנתרן מטען חיובי. הם משחקים תפקיד מאוד מרכזי בחידוש הפולס החשמלי בכל פעם."}, {"type": "paragraph", "text": "בתוך כרום התא יש תעלות, שדרכם היונים יכולים להיכנס ולצאת למרק."}, {"type": "paragraph", "text": "לכל יון יש תעלה משלו הוא לא יכול להיכנס לתעלות אחרות כי הוא לא מתאים שם כל יון יודע לאן הוא נכנס."}, {"type": "image-row", "images": ["/doc-assets/image-143.png"]}, {"type": "paragraph", "text": "למה שיון יכנס ויצא מתא? זה די פשוט יש שני כללים: אחד יונים מתרחקים מריכוז גבוה של יונים מאותו סוג (לא בא לי להיות עם כולם) כמו שטסים לחול ופוגשים מלא ישראלים. אני רוצה להות יחודי. כלל שני יונים נמשכים למטענים הפוכים. אם אני עם מטען חיובי אני אלך למינוס ואם אני מינוס אני אלך לפלוס. זה מה שמחליט אם הם יעברו את התעלה."}, {"type": "image-row", "images": ["/doc-assets/image-144.png"]}, {"type": "paragraph", "text": "כדי להבין את פוטנציאל הפעולה אנחנו צריכים להבין שני דברים אנחנו צריכים להבין את הנוירון שלא יורה עדין קוראים לזה מצב מנוחה, ואנחנו צריכים להבין את הנוירון שיורה שקוראים לו פוטנציאל פעולה."}, {"type": "image-row", "images": ["/doc-assets/image-145.png"]}, {"type": "paragraph", "text": "פוטנציאל המנוחה זה מצב ממש של שהתא מתוח לגמרי כמו קפיץ כמו הסוסים שהם מחכים רק לרגע שהשער יפתח והתא יתחיל לירות הוא מחכה בדריכות האם יתנו לו לירות האם יתנו לו לרוץ בדרבי. הדריכות היא למתי תהיה הפעולה."}, {"type": "image-row", "images": ["/doc-assets/image-146.png"]}, {"type": "paragraph", "text": "מי גורם לדריכות הזו במצב מנוחה בתוך פוטנציאל המנוחה יש לנו בהתחלה הגודל של החיבורים כאן לא אומר שזה יותר גדול אלא כמה ריכוז יש. בתוך התא בפנים יש יותר אשלגן ויש גם נצרן אבל פחות ובחוץ יש יותר נתרן."}, {"type": "paragraph", "text": "תחשבו רגע על הסיטואציה מה הנתרן רוצה לעשות? מה הנתרן רוצה לעשות ברגע זה? יש המון נתרן בחוץ והוא רוצה להתרחק מהנתרנים שיש בחוץ הוא לא רוצה להיות עם כולם."}, {"type": "image-row", "images": ["/doc-assets/image-147.png"]}, {"type": "paragraph", "text": "באופן טבעי פוטנציאל הפעולה המנוחה של התא שהוא מינוס 70 יש לו מטען שלילי. בפנים הוא שלילי. הנתרן רוצה לברוח מהנתרנים הנוספים שיש איתו בחוץ ומה מבחינת המטען הוא רוצה ללכת לשלילי הוא רוצה להיכנס פנימה יש לנתרן סיבה מאוד טובה להיכנס הוא רוצה להתרחק מהריכוז הגבוה של הנתרינים חוץ ובפנים המטען שלילי."}, {"type": "paragraph", "text": "אבל יש בעיה קטנה יש את התעלות."}, {"type": "image-row", "images": ["/doc-assets/image-148.png"]}, {"type": "paragraph", "text": "הנתרן רוצה להיכנס יש לו את כל הסיבות להיכנס לתא אבל יש בעיה השער שלו סגור. התעלה של הנתרנים סגורה כל התעלות שלהם סגורות הם לא מצליחים להיכנס מצד שני לאשלגן זה פתוח אז האשלגן יוצא ונכנס בכיף שלו והנתרן מחכה בחוץ לתא מחוץ לאקסון והוא מאוד רוצה להיכנס לאקסון אבל לא יכול כי הם סגורות."}, {"type": "paragraph", "text": "האשלגן בתעלות שלו פתוחות מה שולט על תנועת האשלגן? אותם כללים הוא רוצה לברוח מריכוז האשלגן בפנים אבל הוא נמשך למטען חשמלי הפוך בסופו של דבר בתעלות פתוחות האשלגן מגיע לאיזה שיווי משקל והוא ומכן להישאר. האיזון של האשלגן הוא מאוד אוהב להיות בריכוז יחסית גבוה כי בפנים שלילי אבל לא יותר מידי גבוה כי יש שם יותר מידי אשלגן ואז לא נעים לו."}, {"type": "paragraph", "text": "מצב המנוחה זה המצב שבו שערי הנתרן סגורים."}, {"type": "image-row", "images": ["/doc-assets/image-149.png"]}, {"type": "paragraph", "text": "נניח ובו מצב שהנתרנים כן מצליחים להיכנס מתברר שיש מנגנון בתוך התא שקוראים לו משאבת נתרן אשלגן ומה הוא עושה ברגע שהוא רואה נתרנים בפנים הוא מוציא שלושה נתרנים החוצה ומכניס שני אלשגנים פנימה. הוא עושה את זה כל הזמן הדבר הזה עובד מאוד קשה וזה מה שלוקח לנו יותר אנרגיה. לכן המוח צריך הרבה אנרגיה כי המשאבה הזו לוקחת המון משאבים. איפה יהיה לי חיובי? אם אני מוציאה שלשה פלוסים הכנסתי שני פלוסים זה אומר שבפנים יהיה יותר שלילי היא מוציאה את הנתרן ומכניסה את האשלגן ודואגת שכל הזמן יהיה שלילי בתוך התא בגלל עבודתה הקשה הנתרן עוד יותר רוצה להיכנס."}, {"type": "paragraph", "text": "במצב מנוחה יותר אשלגן בפנים יותר נתרן בחוץ. תעלות האשלגן פתוחות תעלות הנתרן סגורות ומשאבת הנתרן אשלגן מוציא נתרנים שנכנסו כל הזמן."}, {"type": "image-row", "images": ["/doc-assets/image-150.png"]}, {"type": "paragraph", "text": "לכל תאי עצב זה אותו דבר כל הנוירונים פוטנציאל המנוחה שלהם הוא מינוס 70 מיליוולט."}, {"type": "image-row", "images": ["/doc-assets/image-151.png"]}, {"type": "image-row", "images": ["/doc-assets/image-152.png"]}, {"type": "image-row", "images": ["/doc-assets/image-153.png"]}, {"type": "paragraph", "text": "ברגע שפנים התא חיובי התעלות נפתחות והנתרן זורם פנימה וזה תהליך מאוד מהיר."}, {"type": "paragraph", "text": "כל פעם שהפלוסים בפנים זה כמו הנתרנים"}, {"type": "paragraph", "text": "אני צריכה שנוירונים יגיבו שהם יתחילו לחשוב כדי שהם יעבירו את האות בצורה מהירה."}, {"type": "image-row", "images": ["/doc-assets/image-154.png"]}, {"type": "paragraph", "text": "בגרף רואים את פוטנציאל הפעולה מי שלילי ומי חיוב. תראו את הזמן אלפית השנייה חמש אלפיות השניה יש פה וקיבלנו פוטנציאל פעולה עולה יורד והוא חוזר למצב מנוחה. יש נוירונים מהירים יותר ויש מהירים פחות. יש פה מפה של שש תחנות ונראה כל תחנה ונבין אותה."}, {"type": "paragraph", "text": "תחנה ראשונה מודדים את התא לפי הזמן והעוצמה שלו הוא נמצא במינוס 70 ופתאום הוא נהיה פחות שלילי. האם הוא פחות שלילי כדי לפתוח את דלתות הנתרן? לא."}, {"type": "image-row", "images": ["/doc-assets/image-155.png"]}, {"type": "paragraph", "text": "הוא נכנס לתוך התא והופך אותו לטיפה יותר חיובי. למשל בתהליך שאני הבנתי משהו אבל לא עד הסוף כל מיחני דברים שזה עוד לא ועכשיו מתי התא באמת מתחיל להגי באמת זו השאלה הגדולה."}, {"type": "image-row", "images": ["/doc-assets/image-156.png"]}, {"type": "paragraph", "text": "זה נקרא התחלות שנכשלו התא לא מגיב עדין לא קורה שם כלום"}, {"type": "image-row", "images": ["/doc-assets/image-157.png"]}, {"type": "paragraph", "text": "הפוטנציאל של התא השתנה לכיון טוב לכיון של לפתוח את התעלות אבל לא לגמרי נכנס קצת מוליך עצבי זה הסבר לepsp אם יש הרבה תאים ששולחים לי את זה גורם לי להיות פחות שלילי מתישהו קורה הנס שעברתי את סף הפעולה עוברים לנקודה 2"}, {"type": "image-row", "images": ["/doc-assets/image-158.png"]}, {"type": "paragraph", "text": "בשלב מסוים נכנס מספיק מוליך עצבי והתא עובר את סף הפעולה זה לא כזה גבוה"}, {"type": "image-row", "images": ["/doc-assets/image-159.png"]}, {"type": "paragraph", "text": "הוא נמצא במינוס 55 אם נכנס מספיק מוליך עצבי זה אומר שאני מספיק חיובי כדי לפתוח את התעלות. התא עובר סוף סוף את תא הפעולה."}, {"type": "image-row", "images": ["/doc-assets/image-160.png"]}, {"type": "paragraph", "text": "הנתרן חיכה על הגדרות והתא סוף סוף פותח והנתרן נכנס בפתאומיות מה שפותח עוד תא וזה מתרחש כמו גל מהיר בכל התא."}, {"type": "image-row", "images": ["/doc-assets/image-161.png"]}, {"type": "paragraph", "text": "הנתרנים עצמם חיובים ומה קורה למקום שהמון יונים חיוביים נמצאים יחד? קודם כל היא נהיה יותר חיובי. אבל"}, {"type": "image-row", "images": ["/doc-assets/image-162.png"]}, {"type": "paragraph", "text": "דיפולריזציה המון נתרן נכנס לתא זו מילה שצריך להכיר היא נמצאת בגרף מצד שמאל."}, {"type": "paragraph", "text": "האם לפתוח את האקסון מתחיל בתחילתו בגבעת האקסון שם הסוף של כל חישוב שהתא עשה ועכשיו אני מחליט האם לפתוח כן או לא."}, {"type": "image-row", "images": ["/doc-assets/image-163.png"]}, {"type": "image-row", "images": ["/doc-assets/image-164.png"]}, {"type": "image-row", "images": ["/doc-assets/image-165.png"]}, {"type": "paragraph", "text": "הדי פולריזציה מעלה את כל התא הוא נהיה פלוס 40 ושהם יוצאים זה נקרא רי פולריזציה. קודם יש דיפולריזציה וריפולריזציה מגיע אחר כך. הרבה אשלגנים יוצאים החוצה אבל כמו תנועה המונית מה קורה, האשלגנים יוצאים"}, {"type": "image-row", "images": ["/doc-assets/image-166.png"]}, {"type": "image-row", "images": ["/doc-assets/image-167.png"]}, {"type": "paragraph", "text": "ֿ"}, {"type": "image-row", "images": ["/doc-assets/image-168.png"]}, {"type": "paragraph", "text": "לתא יש בעיה כי בתוכו יש נתרן והאשלגן בחוץ והמצב הפוך ומה עושים? כדי להוציא את כל הנתרנים החוצה ולהכניס את האשלגן פנימה"}, {"type": "image-row", "images": ["/doc-assets/image-169.png"]}, {"type": "paragraph", "text": "זה לוקח המון אנרגיה ובכל פעם שתא עצב יורד. מה הגוף. עושה שהוא עושה עבודה מאומצת מידי הוא מזרים המון דם עם חמצן."}, {"type": "image-row", "images": ["/doc-assets/image-170.png"]}, {"type": "paragraph", "text": "החשמל אף פעם לא חוזר אחורה. ההיפוקורליזציה היא סוגרת את הדלת במקטעים הראשונים כדי שהנתרנים לא יחזרו לפתוח אותם."}, {"type": "image-row", "images": ["/doc-assets/image-171.png"]}, {"type": "image-row", "images": ["/doc-assets/image-172.png"]}, {"type": "paragraph", "text": "הכחול מעלה את החיוביות של התא והאדום מוריד את החיוביות."}, {"type": "image-row", "images": ["/doc-assets/image-173.png"]}, {"type": "image-row", "images": ["/doc-assets/image-174.png"]}]}, {"id": "topic-37", "title": "תפיסה", "blocks": [{"type": "paragraph", "text": "אזורי החישה השונים מיקום בערך"}, {"type": "image-row", "images": ["/doc-assets/image-175.png"]}, {"type": "image-row", "images": ["/doc-assets/image-176.png"]}, {"type": "paragraph", "text": "הבינה יצרה סמלים לחושים במקום שמונה הוא יצר תשעה. הוא יצר את חוש הטעם פעמיים."}, {"type": "image-row", "images": ["/doc-assets/image-177.png"]}, {"type": "paragraph", "text": "איזה מידע קולט האיזור הזה? ראיה. מהעיניים עובר לאונה האוקסיפיטלית החלק האחורי במוח."}, {"type": "image-row", "images": ["/doc-assets/image-178.png"]}, {"type": "paragraph", "text": "איזה מידע קולט האזור הזה? זה יושב הכי קרוב לקליפת המוח לטמפורלי אזורי שפה וקשור לשמיעה."}, {"type": "image-row", "images": ["/doc-assets/image-179.png"]}, {"type": "paragraph", "text": "איזה חוש קשור לאזור הזה? הסנסורי זה בדיוק קשור לחוש המישוש כי הם יושבים מאוד קרוב הם ממש שכנים מה שצבוע זה הסולקוס המרכזי. המישוש עושה גם את הפרופסציה אם אני שמה רגלים על הקרקע אני מרגישה אותו וזה עוזר לי להרגיש איפה אני נמצאת."}, {"type": "image-row", "images": ["/doc-assets/image-180.png"]}, {"type": "paragraph", "text": "אזור שקרוב לאיבר שהוא נמצא – חוש הריח."}, {"type": "image-row", "images": ["/doc-assets/image-181.png"]}, {"type": "paragraph", "text": "זה אזור הטעם הוא מאוד קרוב לאזור הריח."}, {"type": "image-row", "images": ["/doc-assets/image-182.png"]}, {"type": "paragraph", "text": "הטעם והריח מאוד קרובים אחד לשני, והם מאוד קרובים למערכת הרגש. שאם שואלים אותנו על טעם ספציפי או ריח מסוים שזה גורם לנו לחזור לנקודה שזה מזכיר לי את זה. הטעם והריח יותר בחוץ והשמיעה הוא יותר פנימי."}, {"type": "image-row", "images": ["/doc-assets/image-183.png"]}]}, {"id": "topic-38", "title": "מה זה פרופריוסצפיה, אינטרוספציה, עצב הווגאס", "blocks": [{"type": "paragraph", "text": "המוח קולט גירוים מהעולם בעזרת החושים ולכל חוש יש אזור משלו"}, {"type": "paragraph", "text": "כמה חושים יש לנו? זו שאלה מאוד מעניינת החוקרים אומרים שמונה חושים יש את החמישה הבסיסיים אבל יש עוד כמה חושים פרופריוספציה – ״לדעת איפה האברים״ המוח יודע בכל רגע נתון איפה הכל נמצא, אם הדבר הזה נעלם אני לא יכולה לזוז בכלל זה קשור גם לתחושה המרחבית. זו המפה שלי בתוך העולם, בלי זה אני לא יכול לז
